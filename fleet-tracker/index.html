<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cakir Logistics | Fleet Control Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css"/>
<style>
  :root {
    --bg: #0b0f1a; --panel: #111827; --panel2: #1a2235; --border: #1e2d45;
    --accent: #00d4ff; --accent2: #0099bb; --green: #00e676; --yellow: #ffea00;
    --red: #ff4444; --text: #e2e8f0; --muted: #64748b; --sidebar: 380px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; }

  /* ===== SIDEBAR ===== */
  #sidebar { width: var(--sidebar); min-width: var(--sidebar); height: 100vh; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 1000; position: relative; }
  .brand { padding: 20px 20px 16px; border-bottom: 1px solid var(--border); background: linear-gradient(135deg, #0f1d30 0%, #0b1525 100%); }
  .brand-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .brand-icon { width: 36px; height: 36px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: 0 0 20px rgba(0,212,255,0.4); }
  .brand-name { font-family: 'IBM Plex Mono', monospace; font-size: 15px; font-weight: 700; color: white; letter-spacing: 0.05em; }

  /* Stats row */
  .stats-row { display: flex; padding: 14px 20px; gap: 10px; border-bottom: 1px solid var(--border); }
  .stat-box { flex: 1; background: var(--panel2); border: 1px solid var(--border); border-radius: 8px; padding: 10px; text-align: center; }
  .stat-val { font-family: 'IBM Plex Mono', monospace; font-size: 18px; font-weight: 700; color: var(--accent); }
  .stat-lbl { font-size: 8px; text-transform: uppercase; color: var(--muted); margin-top: 4px; }

  /* Driver list */
  .driver-list { flex: 1; overflow-y: auto; padding: 12px; }
  .driver-card {
    background: var(--panel2); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 14px; margin-bottom: 8px; cursor: pointer; transition: 0.2s;
    display: flex; align-items: center; gap: 12px; position: relative; overflow: hidden;
  }
  .driver-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--muted); }
  .driver-card.active { border-color: var(--accent); background: #0f1e33; }
  .driver-card.status-rijden::before { background: var(--green); }
  .driver-card.status-sos::before { background: var(--red); animation: pulse_red 1s infinite; }
  @keyframes pulse_red { 50% { opacity: 0.3; } }

  .driver-avatar {
    width: 40px; height: 40px; border-radius: 10px;
    background: linear-gradient(135deg, #1e3a5f, #0a1e35); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center; font-family: 'IBM Plex Mono', monospace; font-weight: 700; color: var(--accent);
  }

  .route-btn-small {
    background: var(--accent); color: #000; border: none; padding: 4px 8px; border-radius: 4px;
    font-size: 10px; font-weight: bold; cursor: pointer; margin-left: auto;
  }

  /* ROUTE PANEL (DONKER) */
  #route-panel { border-top: 1px solid var(--border); background: #0a1520; max-height: 0; overflow: hidden; transition: 0.4s ease; }
  #route-panel.open { max-height: 220px; padding: 16px 20px; }
  .route-title { font-size: 10px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; font-family: 'IBM Plex Mono'; }
  .route-stats { display: flex; gap: 20px; margin-bottom: 14px; }
  .route-stat-val { font-family: 'IBM Plex Mono'; font-size: 22px; font-weight: 700; color: var(--accent); }

  /* MAP UI */
  #map { flex: 1; height: 100vh; position: relative; background: #0b0f1a; }
  #status-bar {
    position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
    z-index: 1100; background: rgba(0,0,0,0.85); color: white; padding: 8px 16px;
    border-radius: 4px; font-size: 12px; border: 1px solid var(--accent); display: none;
  }
  .map-tools { position: absolute; right: 16px; bottom: 40px; z-index: 900; display: flex; flex-direction: column; gap: 8px; }
  .ctrl-btn { width: 38px; height: 38px; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .ctrl-btn.active { color: var(--accent); border-color: var(--accent); }

  /* PULSING DOT ME */
  .pulse-me {
    width: 12px; height: 12px; background: #2196f3; border: 2px solid white; border-radius: 50%;
    box-shadow: 0 0 0 rgba(33, 150, 243, 0.4); animation: pulse 2s infinite;
  }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0px rgba(33, 150, 243, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(33, 150, 243, 0); } 100% { box-shadow: 0 0 0 0px rgba(33, 150, 243, 0); } }

  .leaflet-routing-container { display: none !important; }
</style>
</head>
<body>

<div id="status-bar"></div>

<div id="sidebar">
    <div class="brand">
        <div class="brand-logo">
            <div class="brand-icon">🚛</div>
            <div>
                <div class="brand-name">CAKIR LOGISTICS</div>
                <div style="font-size: 9px; color: var(--accent); letter-spacing: 0.2em; text-transform: uppercase;">Traffic Control V10</div>
            </div>
        </div>
    </div>

    <div class="stats-row">
        <div class="stat-box"><div class="stat-val" id="stat-active">0</div><div class="stat-lbl">Totaal</div></div>
        <div class="stat-box"><div class="stat-val" id="stat-rijdend" style="color:var(--green)">0</div><div class="stat-lbl">Rijdend</div></div>
        <div class="stat-box"><div class="stat-val" id="stat-sos" style="color:var(--red)">0</div><div class="stat-lbl">SOS</div></div>
    </div>

    <div class="driver-list" id="driver-list"></div>

    <div id="route-panel">
        <div class="route-title">📍 ROUTE: MIJ ➔ CHAUFFEUR</div>
        <div class="route-stats">
            <div class="route-stat"><div class="route-stat-val" id="route-time">--</div><div style="font-size: 10px; color: var(--muted);">Reistijd</div></div>
            <div class="route-stat"><div class="route-stat-val" id="route-dist">--</div><div style="font-size: 10px; color: var(--muted);">Afstand</div></div>
        </div>
        <button onclick="window.clearRoute()" style="width:100%; padding:8px; background:var(--panel2); border:1px solid var(--border); color:white; border-radius:6px; cursor:pointer; font-weight:bold; font-size:11px;">✕ ROUTE WISSEN</button>
    </div>
</div>

<div id="map">
    <div class="map-tools">
        <button class="ctrl-btn" onclick="window.toggleTraffic()" id="btn-traffic" title="Traffic Layer">🚦</button>
        <button class="ctrl-btn" onclick="window.toggleTile()" title="Satelliet">🛰️</button>
        <button class="ctrl-btn" onclick="window.getMyLocation(true)">🎯</button>
        <button class="ctrl-btn" onclick="window.map.zoomIn()">+</button>
        <button class="ctrl-btn" onclick="window.map.zoomOut()">−</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        databaseURL: "https://cakir-logistics-tracker-c4b6b-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "cakir-logistics-tracker-c4b6b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // MAP SETUP
    window.map = L.map('map', { center: [51.0654, 4.0289], zoom: 11, zoomControl: false, attributionControl: false });
    
    // Basis Lagen
    const darkTile = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(window.map);
    const satTile = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');
    
    // 🚦 TRAFFIC LAYER (Google Traffic)
    const trafficLayer = L.tileLayer('https://{s}.google.com/vt/lyrs=m,traffic&x={x}&y={y}&z={z}', {
        maxZoom: 20,
        subdomains: ['mt0', 'mt1', 'mt2', 'mt3'],
        opacity: 0 // Start verborgen
    }).addTo(window.map);

    let myLocation = null, myMarker = null, routeControl = null, selectedId = null, trafficOn = false;
    const markers = {}, driverStore = {};

    window.setStatus = (msg, isError = false) => {
        const bar = document.getElementById('status-bar');
        bar.innerText = msg; bar.style.display = 'block';
        bar.style.borderColor = isError ? 'red' : '#00d4ff';
        if(!isError) setTimeout(() => bar.style.display = 'none', 5000);
    };

    // Toggle Traffic
    window.toggleTraffic = () => {
        trafficOn = !trafficOn;
        trafficLayer.setOpacity(trafficOn ? 0.7 : 0);
        document.getElementById('btn-traffic').classList.toggle('active', trafficOn);
        window.setStatus(trafficOn ? "Live Verkeer Ingeschakeld" : "Live Verkeer Uitgeschakeld");
    };

    window.getMyLocation = (focus = false) => {
        if (!navigator.geolocation) return window.setStatus("GPS niet ondersteund", true);
        navigator.geolocation.getCurrentPosition(pos => {
            myLocation = [pos.coords.latitude, pos.coords.longitude];
            const icon = L.divIcon({ className: '', html: '<div class="pulse-me"></div>' });
            if (myMarker) myMarker.setLatLng(myLocation);
            else myMarker = L.marker(myLocation, { icon }).addTo(window.map).bindPopup("Mijn Locatie");
            if (focus) window.map.flyTo(myLocation, 15);
        }, err => {
            if (err.code === 1) window.setStatus("🔒 Toegang geweigerd. Sta locatie toe in je adresbalk.", true);
        }, { enableHighAccuracy: true });
    };

    window.routeToDriver = (id) => {
        if (!myLocation) return window.setStatus("Uw locatie wordt gezocht... klik dadelijk opnieuw.", true);
        if (routeControl) window.map.removeControl(routeControl);
        
        routeControl = L.Routing.control({
            waypoints: [L.latLng(myLocation[0], myLocation[1]), L.latLng(driverStore[id].lat, driverStore[id].lng)],
            lineOptions: { styles: [{ color: '#00d4ff', weight: 6, opacity: 0.8 }] },
            createMarker: () => null
        }).addTo(window.map);

        routeControl.on('routesfound', e => {
            const r = e.routes[0].summary;
            document.getElementById('route-time').innerText = Math.round(r.totalTime / 60) + "m";
            document.getElementById('route-dist').innerText = (r.totalDistance / 1000).toFixed(1) + "km";
            document.getElementById('route-panel').classList.add('open');
        });
    };

    onValue(ref(db, '/'), (snapshot) => {
        const data = snapshot.val() || {};
        const tracking = data.tracking || {}, meldingen = data.meldingen || {};
        const list = document.getElementById('driver-list');
        list.innerHTML = "";
        let tot = 0, rij = 0, sos = 0;

        for (let id in tracking) {
            if (id === "1" || id === "Gast_User") continue;
            tot++;
            const loc = tracking[id], info = meldingen[id] || { naam: "Chauffeur", status: "STANDBY" };
            driverStore[id] = { lat: loc.latitude, lng: loc.longitude };
            if (info.status === "START_RIT") rij++; if (info.status === "SOS") sos++;

            const color = info.status === "SOS" ? "#ff4444" : (info.status === "START_RIT" ? "#00e676" : "#ffea00");
            const icon = L.divIcon({ html: `<div style="background:${color}; width:28px; height:28px; border-radius:50%; border:2px solid white; box-shadow:0 0 10px ${color}; display:flex; align-items:center; justify-content:center; color:black; font-weight:bold; font-size:9px;">TRK</div>`, className: '' });

            if (markers[id]) markers[id].setLatLng([loc.latitude, loc.longitude]).setIcon(icon);
            else markers[id] = L.marker([loc.latitude, loc.longitude], { icon }).addTo(window.map).bindPopup(`<b>${info.naam}</b>`);

            const card = document.createElement('div');
            card.className = `driver-card status-${info.status.toLowerCase()}${selectedId === id ? ' active' : ''}`;
            card.innerHTML = `
                <div class="driver-avatar">${info.naam.substring(0,2).toUpperCase()}</div>
                <div style="flex:1">
                    <div style="font-weight:600; font-size:14px;">${info.naam}</div>
                    <div style="font-size:10px; color:var(--muted);">${info.status}</div>
                </div>
                <button class="route-btn-small" onclick="window.routeToDriver('${id}')">ROUTE</button>
            `;
            card.onclick = (e) => {
                if(e.target.tagName !== 'BUTTON') {
                    selectedId = id; window.map.flyTo([loc.latitude, loc.longitude], 15);
                    document.querySelectorAll('.driver-card').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                }
            };
            list.appendChild(card);
        }
        document.getElementById('stat-active').innerText = tot;
        document.getElementById('stat-rijdend').innerText = rij;
        document.getElementById('stat-sos').innerText = sos;
    });

    window.toggleTile = () => {
        if (window.map.hasLayer(darkTile)) { window.map.removeLayer(darkTile); satTile.addTo(window.map); }
        else { window.map.removeLayer(satTile); darkTile.addTo(window.map); }
    };
    window.clearRoute = () => { if (routeControl) window.map.removeControl(routeControl); document.getElementById('route-panel').classList.remove('open'); };

    // Auto-locate op start
    window.getMyLocation();
</script>
</body>
</html>
