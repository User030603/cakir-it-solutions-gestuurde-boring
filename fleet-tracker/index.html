<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cakir Logistics Control Center</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    
    <style>
        :root { --google-blue: #4285F4; --google-red: #EA4335; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Roboto', Arial, sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        
        /* Floating Google Search Bar Style */
        .google-search-container {
            position: absolute; top: 20px; left: 20px; z-index: 1100;
            width: 390px; background: white; border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3); padding: 10px;
            display: flex; flex-direction: column;
        }

        .search-input-wrapper { display: flex; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .search-input-wrapper input {
            border: none; outline: none; width: 100%; font-size: 16px; padding: 5px 10px;
        }

        /* Chauffeur List Sidebar (Scrollbaar) */
        .driver-tray {
            max-height: 400px; overflow-y: auto; margin-top: 10px;
        }

        .driver-card {
            padding: 12px; border-radius: 6px; cursor: pointer;
            border: 1px solid transparent; transition: 0.2s;
            display: flex; justify-content: space-between; align-items: center;
        }
        .driver-card:hover { background: #f1f3f4; }
        .driver-card.selected { background: #e8f0fe; border: 1px solid var(--google-blue); }

        .driver-info { font-size: 14px; font-weight: 500; color: #3c4043; }
        .status-indicator { font-size: 11px; padding: 2px 6px; border-radius: 4px; color: white; }

        /* Google Maps Floating Buttons */
        .map-tools { position: absolute; bottom: 30px; right: 20px; z-index: 1100; display: flex; flex-direction: column; gap: 10px; }
        .tool-btn {
            background: white; border: none; width: 40px; height: 40px;
            border-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,0.3);
            cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center;
        }

        .eta-panel {
            background: var(--google-blue); color: white; padding: 10px;
            border-radius: 0 0 8px 8px; font-weight: bold; font-size: 13px;
            margin-top: 5px; display: none;
        }
    </style>
</head>
<body>

    <div class="google-search-container">
        <div class="search-input-wrapper">
            <span style="font-size: 20px; margin-right: 10px;">🔍</span>
            <input type="text" id="target-address" placeholder="Zoek een adres of boorlocatie...">
        </div>
        
        <div class="driver-tray" id="driver-list">
            </div>
        <div id="eta-display" class="eta-panel"></div>
    </div>

    <div class="map-tools">
        <button class="tool-btn" onclick="map.locate({setView: true, maxZoom: 16})" title="Mijn Locatie">🎯</button>
        <button class="tool-btn" onclick="location.reload()" title="Verversen">🔄</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "JOUW_KEY",
            databaseURL: "https://cakir-logistics-tracker-c4b6b-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "cakir-logistics-tracker"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Google Maps Layers
        const map = L.map('map', { zoomControl: false }).setView([51.0654, 4.0289], 10);
        
        const googleStreets = L.tileLayer('http://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',{
            maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3']
        }).addTo(map);

        const googleTraffic = L.tileLayer('http://{s}.google.com/vt/lyrs=m,traffic&x={x}&y={y}&z={z}',{
            maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'], opacity: 0.8
        }).addTo(map);

        const geocoder = L.Control.Geocoder.nominatim();
        const markers = {};
        let routeLayer = null;
        let selectedId = null;
        let driverData = {};

        // Functie: Route berekenen (Net als Maps)
        window.planRoute = (destLat, destLon) => {
            if (!selectedId) return alert("Kies eerst een chauffeur!");
            const start = driverData[selectedId];
            
            const url = `https://router.project-osrm.org/route/v1/driving/${start.lon},${start.lat};${destLon},${destLat}?overview=full&geometries=geojson`;
            
            fetch(url).then(r => r.json()).then(data => {
                const route = data.routes[0];
                if (routeLayer) map.removeLayer(routeLayer);
                
                routeLayer = L.geoJSON(route.geometry, {
                    style: { color: '#4285F4', weight: 6, opacity: 0.9 }
                }).addTo(map);

                const mins = Math.round(route.duration / 60);
                const km = (route.distance / 1000).toFixed(1);
                
                const panel = document.getElementById('eta-display');
                panel.style.display = "block";
                panel.innerHTML = `🚗 Snelste route: ${mins} min (${km} km) - Via Google Traffic`;
                
                map.fitBounds(routeLayer.getBounds(), { padding: [100, 100] });
            });
        };

        // Adres Zoekbalk Event
        document.getElementById('target-address').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                geocoder.geocode(e.target.value, (results) => {
                    if (results.length > 0) {
                        const { lat, lng } = results[0].center;
                        window.planRoute(lat, lng);
                    }
                });
            }
        });

        // Firebase Sync
        onValue(ref(db, '/'), (snapshot) => {
            const data = snapshot.val() || {};
            const tracking = data.tracking || {};
            const meldingen = data.meldingen || {};
            const list = document.getElementById('driver-list');
            list.innerHTML = "";

            for (let id in tracking) {
                if (id === "1" || id === "Gast_User") continue;
                const loc = tracking[id];
                const info = meldingen[id] || { naam: "Chauffeur", status: "ONLINE" };
                driverData[id] = { lat: loc.latitude, lon: loc.longitude };

                if (!markers[id]) markers[id] = L.marker([loc.latitude, loc.longitude]).addTo(map);
                markers[id].setLatLng([loc.latitude, loc.longitude]).bindPopup(`<b>${info.naam}</b>`);

                const isSelected = selectedId === id ? "selected" : "";
                const statusColor = info.status === "SOS" ? "#EA4335" : "#34A853";

                list.innerHTML += `
                    <div class="driver-card ${isSelected}" onclick="window.selectDriver('${id}')">
                        <div class="driver-info">
                            <div>${info.naam}</div>
                            <div style="font-size:11px; color:#70757a;">${info.status}</div>
                        </div>
                        <span class="status-indicator" style="background:${statusColor}">●</span>
                    </div>`;
            }
        });

        window.selectDriver = (id) => {
            selectedId = id;
            const p = driverData[id];
            map.flyTo([p.lat, p.lon], 15);
        };
    </script>
</body>
</html>
