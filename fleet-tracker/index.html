<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleet Command Center | Cakir</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #0056b3; --danger: #dc3545; --success: #28a745; --warning: #ffc107; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', 'Segoe UI', sans-serif; background: #f4f7f9; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        
        .admin-sidebar {
            position: absolute; top: 0; left: 0; z-index: 1000;
            width: 350px; height: 100vh; background: white;
            box-shadow: 4px 0 15px rgba(0,0,0,0.1); display: flex; flex-direction: column;
        }

        .header { padding: 25px; background: var(--primary); color: white; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 20px; background: #f8f9fa; }
        .stat-box { padding: 10px; background: white; border-radius: 8px; text-align: center; border: 1px solid #eee; }
        .stat-val { font-size: 20px; font-weight: bold; color: var(--primary); display: block; }
        .stat-label { font-size: 11px; color: #888; text-transform: uppercase; }

        .driver-list-container { flex: 1; overflow-y: auto; padding: 20px; }
        .driver-item {
            background: white; padding: 15px; border-radius: 10px;
            margin-bottom: 15px; border: 1px solid #eef2f7; cursor: pointer;
            transition: all 0.3s ease; position: relative;
        }
        .driver-item:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-color: var(--primary); }
        
        .name-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .driver-name { font-weight: 700; font-size: 15px; color: #2c3e50; }
        
        .badge { font-size: 9px; padding: 4px 8px; border-radius: 20px; font-weight: 800; color: white; }
        .bg-start { background: var(--success); }
        .bg-pauze { background: var(--warning); color: #333; }
        .bg-sos { background: var(--danger); animation: pulse 1.5s infinite; }
        
        .meta-info { font-size: 12px; color: #7f8c8d; display: flex; align-items: center; gap: 5px; margin-top: 4px; }
        
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(220, 53, 69, 0); } 100% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0); } }
    </style>
</head>
<body>

    <div class="admin-sidebar">
        <div class="header">
            <h1 style="margin:0; font-size: 22px;">Control Center</h1>
            <div style="font-size: 12px; opacity: 0.8;">Live Vloot Management</div>
        </div>

        <div class="stats-grid">
            <div class="stat-box">
                <span class="stat-val" id="count-total">0</span>
                <span class="stat-label">Voertuigen</span>
            </div>
            <div class="stat-box">
                <span class="stat-val" id="count-active" style="color: var(--success);">0</span>
                <span class="stat-label">In Rit</span>
            </div>
        </div>

        <div class="driver-list-container" id="driver-list">
            </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "JOUW_KEY",
            authDomain: "cakir-logistics-tracker.firebaseapp.com",
            databaseURL: "https://cakir-logistics-tracker-c4b6b-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "cakir-logistics-tracker"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const map = L.map('map', { zoomControl: false }).setView([51.0654, 4.0289], 10);
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        
        // Meerdere kaartlagen voor een pro look
        const streetMap = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        const markers = {};

        window.focusOnDriver = (lat, lon, id) => {
            map.flyTo([lat, lon], 16);
            if(markers[id]) markers[id].openPopup();
        };

        function calculateTime(ts) {
            if(!ts) return "0m";
            const mins = Math.floor((Date.now() - ts) / 60000);
            return mins < 60 ? mins + "m" : Math.floor(mins/60) + "u " + (mins%60) + "m";
        }

        onValue(ref(db, '/'), (snapshot) => {
            const data = snapshot.val() || {};
            const tracking = data.tracking || {};
            const meldingen = data.meldingen || {};
            
            const list = document.getElementById('driver-list');
            list.innerHTML = "";
            
            let total = 0; let active = 0;

            for (let id in tracking) {
                if (id === "1" || id === "Gast_User") continue;
                total++;
                
                const loc = tracking[id];
                const info = meldingen[id] || { naam: "Onbekend", status: "OFFLINE", timestamp: Date.now() };
                if(info.status === "START_RIT") active++;

                const statusColor = info.status.toLowerCase().includes("sos") ? "bg-sos" : (info.status === "START_RIT" ? "bg-start" : "bg-pauze");

                // Marker met aangepast icoon logica
                if (markers[id]) {
                    markers[id].setLatLng([loc.latitude, loc.longitude]);
                } else {
                    markers[id] = L.marker([loc.latitude, loc.longitude]).addTo(map).bindPopup(`<b>${info.naam}</b>`);
                }

                list.innerHTML += `
                    <div class="driver-item" onclick="focusOnDriver(${loc.latitude}, ${loc.longitude}, '${id}')">
                        <div class="name-row">
                            <span class="driver-name">${info.naam}</span>
                            <span class="badge ${statusColor}">${info.status}</span>
                        </div>
                        <div class="meta-info">📍 ${loc.latitude.toFixed(3)}, ${loc.longitude.toFixed(3)}</div>
                        <div class="meta-info">⏱️ Bezig: <b>${calculateTime(info.timestamp)}</b></div>
                    </div>`;
            }
            document.getElementById('count-total').innerText = total;
            document.getElementById('count-active').innerText = active;
        });
    </script>
</body>
</html>
