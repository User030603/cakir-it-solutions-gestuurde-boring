<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cakir Logistics | Fleet Command V12</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css"/>
<style>
  :root {
    --bg:#0b0f1a; --panel:#111827; --panel2:#1a2235; --border:#1e2d45;
    --accent:#00d4ff; --green:#00e676; --yellow:#ffea00; --red:#ff4444;
    --text:#e2e8f0; --muted:#64748b; --sidebar:370px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'IBM Plex Sans',sans-serif; background:var(--bg); color:var(--text); height:100vh; overflow:hidden; display:flex; }

  #sidebar { width:var(--sidebar); min-width:var(--sidebar); height:100vh; background:var(--panel); border-right:1px solid var(--border); display:flex; flex-direction:column; z-index:1000; box-shadow:10px 0 30px rgba(0,0,0,0.5); }
  .brand { padding:20px; background:linear-gradient(135deg,#0f1d30,#0b1525); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; }
  .brand-icon { width:40px; height:40px; background:var(--accent); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; box-shadow:0 0 20px rgba(0,212,255,0.4); }
  .brand-name { font-family:'IBM Plex Mono',monospace; font-size:15px; font-weight:700; color:white; }

  .stats-row { display:flex; padding:14px 16px; gap:10px; border-bottom:1px solid var(--border); }
  .stat { flex:1; background:var(--panel2); border:1px solid var(--border); border-radius:8px; padding:10px; text-align:center; }
  .stat-val { font-family:'IBM Plex Mono',monospace; font-size:22px; font-weight:700; color:var(--accent); }
  .stat-lbl { font-size:9px; color:var(--muted); text-transform:uppercase; margin-top:3px; }

  #driver-list { flex:1; overflow-y:auto; padding:12px; }
  .driver-card { background:var(--panel2); border:1px solid var(--border); border-radius:10px; padding:12px 14px; margin-bottom:8px; cursor:pointer; transition:0.2s; display:flex; align-items:center; gap:12px; position:relative; overflow:hidden; }
  .driver-card.active { border-color:var(--accent); background:#0f1e33; }
  .driver-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--muted); }
  .driver-card.s-sos::before { background:var(--red); animation:blink 0.8s infinite; }
  .driver-card.s-start_rit::before { background:var(--green); }
  .d-avatar { width:38px; height:38px; border-radius:9px; background:linear-gradient(135deg,#1e3a5f,#0a1e35); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-family:'IBM Plex Mono',monospace; font-weight:700; color:var(--accent); }
  .start-btn { background:var(--green); color:#000; border:none; border-radius:5px; padding:6px 12px; font-size:10px; font-weight:700; cursor:pointer; margin-left:auto; }

  #route-panel { border-top:1px solid var(--border); background:#0a1520; max-height:0; overflow:hidden; transition:0.4s ease; }
  #route-panel.open { max-height:300px; padding:16px 18px; overflow-y:auto; }
  .leaflet-routing-container { width:100% !important; background:transparent !important; color:white !important; border:none !important; box-shadow:none !important; }
  .leaflet-routing-alt { background:#1a2235 !important; padding:10px !important; border-radius:8px !important; margin-bottom:10px; }

  #map { flex:1; height:100vh; position:relative; }
  .map-tools { position:absolute; right:16px; bottom:36px; z-index:900; display:flex; flex-direction:column; gap:8px; }
  .ctrl-btn { width:40px; height:40px; background:var(--panel); border:1px solid var(--border); border-radius:9px; color:var(--text); font-size:17px; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 12px rgba(0,0,0,0.5); }
  .ctrl-btn.active { color:var(--accent); border-color:var(--accent); box-shadow:0 0 10px var(--accent-glow); }

  #loading { position:fixed; inset:0; background:var(--bg); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
</style>
</head>
<body>

<div id="loading">
  <div style="font-size:50px;animation:spin 2s linear infinite;">🛰️</div>
  <p style="margin-top:20px;font-family:'IBM Plex Mono';color:var(--accent);">CAKIR LOGISTICS: SYNCING...</p>
</div>

<div id="sidebar">
  <div class="brand">
    <div class="brand-icon">🚛</div>
    <div>
      <div class="brand-name">CAKIR LOGISTICS</div>
      <div style="font-size:10px;color:var(--accent);letter-spacing:2px;">ENTERPRISE V12</div>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat"><div class="stat-val" id="s-total">0</div><div class="stat-lbl">Vloot</div></div>
    <div class="stat"><div class="stat-val" id="s-rij" style="color:var(--green)">0</div><div class="stat-lbl">Rijdend</div></div>
    <div class="stat"><div class="stat-val" id="s-sos" style="color:var(--red)">0</div><div class="stat-lbl">SOS</div></div>
  </div>

  <div id="driver-list"></div>

  <div id="route-panel">
    <div style="font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:10px;font-family:'IBM Plex Mono'">📍 Instructies</div>
    <div id="instructions-content"></div>
    <button onclick="window.clearRoute()" style="width:100%;padding:8px;background:var(--panel2);border:1px solid var(--border);color:white;border-radius:6px;cursor:pointer;margin-top:10px;font-size:11px;">✕ WISSEN</button>
  </div>
</div>

<div id="map">
  <div class="map-tools">
    <button class="ctrl-btn" onclick="window.toggleLayer('light')" id="btn-light" title="Lichte Kaart">⚪</button>
    <button class="ctrl-btn" onclick="window.toggleLayer('dark')" id="btn-dark" title="Cyber Dark Kaart">⚫</button>
    <button class="ctrl-btn" onclick="window.toggleLayer('sat')" id="btn-sat" title="Satelliet">🛰️</button>
    <button class="ctrl-btn" onclick="window.toggleTraffic()" id="btn-traffic" title="Traffic">🚦</button>
    <button class="ctrl-btn" onclick="window.getMyLocation()" title="Mijn Locatie">🎯</button>
    <button class="ctrl-btn" onclick="map.zoomIn()">+</button>
    <button class="ctrl-btn" onclick="map.zoomOut()">−</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const firebaseConfig = {
  databaseURL: "https://cakir-logistics-tracker-c4b6b-default-rtdb.europe-west1.firebasedatabase.app/",
  projectId: "cakir-logistics-tracker-c4b6b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// MAP INITIALISATIE
window.map = L.map('map', { center:[51.0654,4.0289], zoom:11, zoomControl:false, attributionControl:false });

// KAART LAGEN DEFINITIES
const layers = {
  light: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'),
  dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'),
  sat: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'),
  traffic: L.tileLayer('https://{s}.google.com/vt/lyrs=m,traffic&x={x}&y={y}&z={z}', {
    maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'], opacity: 0.6
  })
};

layers.light.addTo(window.map); // Start met licht
document.getElementById('btn-light').classList.add('active');

let trafficOn = false;
let currentLayer = 'light';

window.toggleLayer = (type) => {
  window.map.removeLayer(layers[currentLayer]);
  layers[type].addTo(window.map);
  currentLayer = type;
  
  // UI Update knoppen
  ['light', 'dark', 'sat'].forEach(l => document.getElementById(`btn-${l}`).classList.remove('active'));
  document.getElementById(`btn-${type}`).classList.add('active');
};

window.toggleTraffic = () => {
  trafficOn = !trafficOn;
  if(trafficOn) layers.traffic.addTo(window.map);
  else window.map.removeLayer(layers.traffic);
  document.getElementById('btn-traffic').classList.toggle('active', trafficOn);
};

// LOCATIE & ROUTING
let myLocation = null, routeControl = null;
const markers = {}, driverStore = {};

window.getMyLocation = () => {
  navigator.geolocation.getCurrentPosition(pos => {
    myLocation = [pos.coords.latitude, pos.coords.longitude];
    window.map.flyTo(myLocation, 15);
    L.circleMarker(myLocation, { radius: 8, color: '#00d4ff', fillColor: '#00d4ff', fillOpacity: 0.8 }).addTo(window.map);
  });
};

window.startRoute = (id) => {
  if(!myLocation) return alert("Haal eerst je eigen locatie op (🎯)");
  const target = driverStore[id];
  if(routeControl) window.map.removeControl(routeControl);

  routeControl = L.Routing.control({
    waypoints: [L.latLng(myLocation[0], myLocation[1]), L.latLng(target.lat, target.lng)],
    lineOptions: { styles: [{ color: '#00d4ff', weight: 6 }] },
    createMarker: () => null
  }).addTo(window.map);

  routeControl.on('routesfound', () => {
    document.getElementById('route-panel').classList.add('open');
    const content = document.getElementById('instructions-content');
    content.innerHTML = "";
    const leafletBox = document.querySelector('.leaflet-routing-container');
    if(leafletBox) content.appendChild(leafletBox);
  });
};

// FIREBASE SYNC
onValue(ref(db, '/'), (snap) => {
    const data = snap.val() || {};
    const tracking = data.tracking || {};
    const meldingen = data.meldingen || {};
    const list = document.getElementById('driver-list');
    list.innerHTML = "";
    let tot = 0, rij = 0, sos = 0;

    for (let id in tracking) {
        if(id === "1" || id === "Gast_User") continue;
        tot++;
        const loc = tracking[id], info = meldingen[id] || { naam: "Chauffeur", status: "STANDBY" };
        driverStore[id] = { lat: loc.latitude, lng: loc.longitude };
        if (info.status === "START_RIT") rij++; if (info.status === "SOS") sos++;

        if (markers[id]) markers[id].setLatLng([loc.latitude, loc.longitude]);
        else markers[id] = L.marker([loc.latitude, loc.longitude]).addTo(window.map).bindPopup(info.naam);

        const card = document.createElement('div');
        card.className = `driver-card s-${info.status.toLowerCase()}`;
        card.innerHTML = `
            <div class="d-avatar">${info.naam.substring(0,2).toUpperCase()}</div>
            <div style="flex:1">
                <div style="font-weight:600;font-size:14px;">${info.naam}</div>
                <div style="font-size:11px;color:var(--muted);">${info.status}</div>
            </div>
            <button class="start-btn" onclick="event.stopPropagation();window.startRoute('${id}')">START ROUTE</button>
        `;
        list.appendChild(card);
    }
    document.getElementById('s-total').textContent = tot;
    document.getElementById('s-rij').textContent = rij;
    document.getElementById('s-sos').textContent = sos;
    document.getElementById('loading').style.display = 'none';
});

window.clearRoute = () => { if(routeControl) window.map.removeControl(routeControl); document.getElementById('route-panel').classList.remove('open'); };
</script>
</body>
</html>
