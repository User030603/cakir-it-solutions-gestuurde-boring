<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cakir Logistics | Enterprise Fleet Control</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --google-blue: #4285F4;
            --google-red: #EA4335;
            --google-yellow: #FBBC05;
            --google-green: #34A853;
            --sidebar-width: 400px;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: 'Roboto', sans-serif; background: #f1f3f4; 
            overflow: hidden; 
        }

        /* De Zwevende Google Maps Sidebar */
        #ui-layer {
            position: absolute; top: 0; left: 0; z-index: 1000;
            width: var(--sidebar-width); height: 100vh;
            pointer-events: none; /* Zorgt dat je door lege plekken op de kaart kunt klikken */
            display: flex; flex-direction: column; padding: 12px; box-sizing: border-box;
        }

        .glass-panel {
            pointer-events: auto;
            background: white; border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.3);
            margin-bottom: 12px;
        }

        /* Zoekbalk met Autocomplete Look */
        .search-section { padding: 8px 16px; display: flex; align-items: center; min-height: 48px; }
        .search-section input {
            border: none; outline: none; width: 100%; font-size: 16px; color: #3c4043;
        }
        .search-icon { color: #70757a; margin-right: 15px; font-size: 20px; }

        /* Chauffeur Dashboard binnen de sidebar */
        .fleet-section { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .fleet-header { 
            padding: 16px; border-bottom: 1px solid #e8eaed; 
            display: flex; justify-content: space-between; align-items: center;
        }
        .fleet-header h2 { margin: 0; font-size: 18px; color: var(--google-blue); }

        .driver-list { overflow-y: auto; flex: 1; }
        .driver-card {
            padding: 16px; border-bottom: 1px solid #f1f3f4;
            cursor: pointer; transition: background 0.2s;
            display: flex; align-items: flex-start; gap: 12px;
        }
        .driver-card:hover { background: #f8f9fa; }
        .driver-card.selected { background: #e8f0fe; border-left: 4px solid var(--google-blue); }

        .driver-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: #e8eaed; display: flex; align-items: center; justify-content: center;
            font-weight: bold; color: #5f6368; font-size: 14px;
        }

        .driver-details { flex: 1; }
        .driver-name { font-weight: 500; font-size: 15px; color: #202124; }
        .driver-meta { font-size: 12px; color: #70757a; margin-top: 4px; }
        
        .status-pill {
            font-size: 10px; padding: 2px 8px; border-radius: 12px;
            text-transform: uppercase; font-weight: bold; margin-left: auto;
        }

        /* Route & Traffic Informatie */
        .route-info-panel {
            padding: 16px; background: var(--google-blue); color: white;
            border-radius: 0 0 8px 8px; display: none;
        }
        .eta-text { font-size: 20px; font-weight: 700; }
        .dist-text { font-size: 14px; opacity: 0.9; }

        /* Kaart Bediening */
        #map { height: 100vh; width: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        .map-controls {
            position: absolute; bottom: 24px; right: 16px; z-index: 1000;
            display: flex; flex-direction: column; gap: 8px;
        }
        .control-btn {
            width: 40px; height: 40px; background: white; border-radius: 4px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.3); border: none;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: #5f6368;
        }
        .control-btn:hover { background: #f1f3f4; }

        /* Traffic Legenda */
        .traffic-legend {
            position: absolute; bottom: 24px; left: calc(var(--sidebar-width) + 24px);
            z-index: 1000; background: white; padding: 8px 12px;
            border-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,0.3);
            font-size: 12px; display: flex; gap: 10px; align-items: center;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="glass-panel search-section">
            <span class="search-icon">📍</span>
            <input type="text" id="address-search" placeholder="Typ bestemming (boorlocatie, stad, adres)..." autocomplete="off">
        </div>

        <div class="glass-panel fleet-section">
            <div class="fleet-header">
                <h2>Cakir IT Solutions</h2>
                <div id="active-count" style="font-size: 12px; color: #70757a;">0 Actief</div>
            </div>
            
            <div class="driver-list" id="driver-list">
                </div>

            <div id="route-panel" class="route-info-panel">
                <div class="eta-text" id="res-time">-- min</div>
                <div class="dist-text" id="res-dist">Berekenen van afstand...</div>
            </div>
        </div>
    </div>

    <div class="map-controls">
        <button class="control-btn" onclick="map.setZoom(map.getZoom()+1)">+</button>
        <button class="control-btn" onclick="map.setZoom(map.getZoom()-1)">-</button>
        <button class="control-btn" onclick="toggleTraffic()">🚦</button>
        <button class="control-btn" onclick="useMyLocation()">🎯</button>
    </div>

    <div class="traffic-legend">
        <b>Verkeer:</b>
        <span style="color:#34A853">● Snel</span>
        <span style="color:#FBBC05">● Traag</span>
        <span style="color:#EA4335">● File</span>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // CONFIGURATIE
        const firebaseConfig = {
            apiKey: "JOUW_KEY",
            databaseURL: "https://cakir-logistics-tracker-c4b6b-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "cakir-logistics-tracker"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        // KAART SETUP
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([51.0654, 4.0289], 10);
        
        // Google Kaart Lagen
        const googleBase = L.tileLayer('http://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
            maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3']
        }).addTo(map);

        const googleTraffic = L.tileLayer('http://{s}.google.com/vt/lyrs=m,traffic&x={x}&y={y}&z={z}', {
            maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'], opacity: 0
        }).addTo(map);

        let trafficVisible = false;
        window.toggleTraffic = () => {
            trafficVisible = !trafficVisible;
            googleTraffic.setOpacity(trafficVisible ? 0.8 : 0);
        };

        window.useMyLocation = () => {
            map.locate({setView: true, maxZoom: 15});
        };

        const geocoder = L.Control.Geocoder.nominatim();
        const markers = {};
        const driverData = {};
        let selectedId = null;
        let routeLine = null;

        // SELECTIE LOGICA
        window.focusDriver = (id) => {
            selectedId = id;
            const data = driverData[id];
            map.flyTo([data.lat, data.lon], 15);
            
            // UI Update
            document.querySelectorAll('.driver-card').forEach(c => c.classList.remove('selected'));
            document.getElementById(`card-${id}`).classList.add('selected');
        };

        // ROUTE PLANNING (ENTER IN ZOEKBALK)
        document.getElementById('address-search').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (!selectedId) return alert("Klik eerst op een chauffeur in de lijst!");
                
                const val = e.target.value;
                geocoder.geocode(val, (results) => {
                    if (results && results.length > 0) {
                        const dest = results[0].center;
                        calculateRoute(dest.lat, dest.lng);
                    }
                });
            }
        });

        async function calculateRoute(dLat, dLon) {
            const start = driverData[selectedId];
            const url = `https://router.project-osrm.org/route/v1/driving/${start.lon},${start.lat};${dLon},${dLat}?overview=full&geometries=geojson`;

            const res = await fetch(url);
            const data = await res.json();
            
            if (data.routes && data.routes[0]) {
                const route = data.routes[0];
                
                if (routeLine) map.removeLayer(routeLine);
                routeLine = L.geoJSON(route.geometry, {
                    style: { color: '#4285F4', weight: 6, opacity: 0.8 }
                }).addTo(map);

                // Update Infopaneel
                const mins = Math.round(route.duration / 60);
                const km = (route.distance / 1000).toFixed(1);
                
                const panel = document.getElementById('route-panel');
                panel.style.display = "block";
                document.getElementById('res-time').innerText = mins + " min";
                document.getElementById('res-dist').innerText = `Afstand: ${km} km via snelste weg`;
                
                map.fitBounds(routeLine.getBounds(), { padding: [100, 100] });
            }
        }

        // FIREBASE DATA LOOP
        onValue(ref(db, '/'), (snapshot) => {
            const data = snapshot.val() || {};
            const tracking = data.tracking || {};
            const meldingen = data.meldingen || {};
            const list = document.getElementById('driver-list');
            
            let activeCount = 0;
            list.innerHTML = "";

            for (let id in tracking) {
                if (id === "1" || id === "Gast_User") continue;
                activeCount++;

                const loc = tracking[id];
                const info = meldingen[id] || { naam: "Chauffeur", status: "Beschikbaar", timestamp: Date.now() };
                driverData[id] = { lat: loc.latitude, lon: loc.longitude };

                // Marker beheer
                if (markers[id]) {
                    markers[id].setLatLng([loc.latitude, loc.longitude]);
                } else {
                    markers[id] = L.marker([loc.latitude, loc.longitude]).addTo(map)
                        .bindPopup(`<b>${info.naam}</b><br>${info.status}`);
                }

                // UI Card genereren
                const isSelected = selectedId === id ? 'selected' : '';
                const initialen = info.naam.substring(0, 2).toUpperCase();
                const verstreken = Math.floor((Date.now() - info.timestamp) / 60000);

                list.innerHTML += `
                    <div class="driver-card ${isSelected}" id="card-${id}" onclick="focusDriver('${id}')">
                        <div class="driver-avatar">${initialen}</div>
                        <div class="driver-details">
                            <div class="driver-name">${info.naam}</div>
                            <div class="driver-meta">Sinds ${verstreken} min in status: ${info.status}</div>
                            <div class="driver-meta">📍 ${loc.latitude.toFixed(4)}, ${loc.longitude.toFixed(4)}</div>
                        </div>
                        <div class="status-pill" style="background: ${info.status === 'SOS' ? '#EA4335' : '#34A853'}; color:white;">
                            ${info.status}
                        </div>
                    </div>`;
            }
            document.getElementById('active-count').innerText = activeCount + " Voertuigen";
        });

    </script>
</body>
</html>
