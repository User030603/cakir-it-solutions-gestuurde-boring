<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cakir Logistics | Open-Source Fleet Control</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --google-blue: #1a73e8; --google-grey: #70757a; --border-color: #dadce0; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Roboto', sans-serif; background: #e5e3df; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; cursor: crosshair; }

        /* --- GOOGLE STYLE FLOATING SIDEBAR --- */
        #side-panel {
            position: absolute; top: 12px; left: 12px; z-index: 1000;
            width: 390px; max-height: 95vh; display: flex; flex-direction: column;
            pointer-events: none;
        }

        .google-card {
            pointer-events: auto; background: white; border-radius: 8px;
            box-shadow: 0 1px 6px rgba(32,33,36,0.28); margin-bottom: 8px;
            overflow: hidden; border: 1px solid var(--border-color);
        }

        /* Zoekbalk */
        .search-container { display: flex; align-items: center; padding: 0 16px; min-height: 48px; }
        .search-icon { color: var(--google-grey); margin-right: 12px; font-size: 20px; }
        .search-container input {
            border: none; outline: none; flex: 1; font-size: 16px; padding: 12px 0; color: #202124;
        }

        /* Chauffeur Lijst */
        .driver-list-wrapper { flex: 1; display: flex; flex-direction: column; min-height: 0; }
        .list-title { padding: 12px 16px; font-size: 12px; font-weight: 500; color: var(--google-grey); text-transform: uppercase; letter-spacing: .5px; }
        .driver-scroll { overflow-y: auto; max-height: 350px; }
        
        .driver-item {
            display: flex; align-items: center; padding: 12px 16px;
            cursor: pointer; border-bottom: 1px solid #f1f3f4; transition: 0.2s;
        }
        .driver-item:hover { background: #f8f9fa; }
        .driver-item.selected { background: #e8f0fe; }

        .avatar { width: 36px; height: 36px; border-radius: 50%; background: #e8eaed; display: flex; align-items: center; justify-content: center; margin-right: 12px; color: #5f6368; font-weight: bold; }
        .d-name { font-size: 14px; font-weight: 500; color: #202124; }
        .d-status { font-size: 12px; color: var(--google-grey); }

        /* Route/Directions Panel (Blauwe balk onderaan de kaart van Google) */
        .directions-panel {
            background: var(--google-blue); color: white; padding: 16px;
            display: none; transition: 0.3s ease-in-out;
        }
        .mode-selector { display: flex; gap: 15px; margin-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.3); padding-bottom: 8px; }
        .mode-btn { background: none; border: none; color: white; opacity: 0.7; cursor: pointer; font-size: 12px; padding: 4px; }
        .mode-btn.active { opacity: 1; border-bottom: 2px solid white; font-weight: bold; }
        .eta-main { font-size: 22px; font-weight: bold; }
        .eta-sub { font-size: 13px; opacity: 0.9; margin-top: 4px; }

        /* Floating Buttons Rechtsonder */
        .map-controls { position: absolute; bottom: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; }
        .fab {
            width: 40px; height: 40px; background: white; border-radius: 4px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.3); border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center; color: #5f6368; font-size: 20px;
        }
        .fab:hover { background: #f1f3f4; }
        .fab.traffic-on { color: var(--google-blue); }
    </style>
</head>
<body>

    <div id="side-panel">
        <div class="google-card search-container">
            <span class="search-icon">🔍</span>
            <input type="text" id="target-search" placeholder="Zoek boorlocatie of adres..." autocomplete="off">
        </div>

        <div class="google-card driver-list-wrapper">
            <div class="list-title">Actieve Vloot</div>
            <div class="driver-scroll" id="driver-list">
                </div>

            <div id="route-output" class="directions-panel">
                <div class="mode-selector">
                    <button class="mode-btn active" onclick="changeMode('driving')">🚗 Auto</button>
                    <button class="mode-btn" onclick="changeMode('cycling')">🚲 Fiets</button>
                    <button class="mode-btn" onclick="changeMode('walking')">🚶 Voet</button>
                </div>
                <div class="eta-main" id="val-time">-- min</div>
                <div id="val-dist" class="eta-sub">Berekenen...</div>
            </div>
        </div>
    </div>

    <div class="map-controls">
        <button class="fab" onclick="map.locate({setView: true, maxZoom: 15})">🎯</button>
        <button class="fab" onclick="window.toggleTraffic()" id="traffic-toggle">🚦</button>
        <button class="fab" onclick="map.setZoom(map.getZoom() + 1)">+</button>
        <button class="fab" onclick="map.setZoom(map.getZoom() - 1)">-</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // CONFIG (Zelfde als voorheen)
        const firebaseConfig = {
            apiKey: "JOUW_KEY",
            databaseURL: "https://cakir-logistics-tracker-c4b6b-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "cakir-logistics-tracker"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // KAART: CARTO DB POSITRON (Lijkt sprekend op Google Maps licht-thema)
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([51.0654, 4.0289], 10);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

        // TRAFFIC LAYER (Google Hybrid Traffic via gratis proxy)
        const trafficLayer = L.tileLayer('https://{s}.google.com/vt/lyrs=m,traffic&x={x}&y={y}&z={z}', {
            maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'], opacity: 0
        }).addTo(map);

        window.toggleTraffic = () => {
            const op = trafficLayer.options.opacity === 0 ? 0.7 : 0;
            trafficLayer.setOpacity(op);
            document.getElementById('traffic-toggle').classList.toggle('traffic-on', op > 0);
        };

        const geocoder = L.Control.Geocoder.nominatim();
        const markers = {};
        const driverPos = {};
        let selectedId = null;
        let routeLine = null;
        let currentDest = null;
        let transportMode = 'driving';

        // SELECTEREN
        window.focusDriver = (id, lat, lon) => {
            selectedId = id;
            map.flyTo([lat, lon], 14);
            document.querySelectorAll('.driver-item').forEach(i => i.classList.remove('selected'));
            document.getElementById(`item-${id}`).classList.add('selected');
        };

        // ROUTE LOGICA
        window.changeMode = (mode) => {
            transportMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            if (currentDest) calculateRoute(currentDest.lat, currentDest.lng);
        };

        map.on('click', (e) => {
            if (!selectedId) return alert("Kies eerst een chauffeur!");
            currentDest = e.latlng;
            calculateRoute(e.latlng.lat, e.latlng.lng);
        });

        async function calculateRoute(dLat, dLon) {
            const start = driverPos[selectedId];
            // OSRM heeft verschillende profielen: driving, cycling, walking
            const url = `https://router.project-osrm.org/route/v1/${transportMode}/${start.lon},${start.lat};${dLon},${dLat}?overview=full&geometries=geojson`;

            const res = await fetch(url);
            const data = await res.json();
            const route = data.routes[0];

            if (routeLine) map.removeLayer(routeLine);
            routeLine = L.geoJSON(route.geometry, { style: { color: '#1a73e8', weight: 6, opacity: 0.8 } }).addTo(map);

            // UI Update Blauwe Balk
            const panel = document.getElementById('route-output');
            panel.style.display = 'block';
            document.getElementById('val-time').innerText = Math.round(route.duration / 60) + " min";
            document.getElementById('val-dist').innerText = `${(route.distance / 1000).toFixed(1)} km via de snelste route`;

            map.fitBounds(routeLine.getBounds(), { padding: [100, 100] });
        }

        // FIREBASE SYNC
        onValue(ref(db, '/'), (snapshot) => {
            const data = snapshot.val() || {};
            const tracking = data.tracking || {};
            const meldingen = data.meldingen || {};
            const list = document.getElementById('driver-list');
            list.innerHTML = "";

            for (let id in tracking) {
                if (id === "1" || id === "Gast_User") continue;
                const loc = tracking[id];
                const info = meldingen[id] || { naam: "Chauffeur", status: "ONLINE" };
                driverPos[id] = { lat: loc.latitude, lon: loc.longitude };

                if (!markers[id]) markers[id] = L.marker([loc.latitude, loc.longitude]).addTo(map);
                markers[id].setLatLng([loc.latitude, loc.longitude]).bindPopup(info.naam);

                list.innerHTML += `
                    <div class="driver-item" id="item-${id}" onclick="focusDriver('${id}', ${loc.latitude}, ${loc.longitude})">
                        <div class="avatar">${info.naam.substring(0, 1).toUpperCase()}</div>
                        <div style="flex:1">
                            <div class="d-name">${info.naam}</div>
                            <div class="d-status">${info.status}</div>
                        </div>
                    </div>`;
            }
        });

        // ZOEKBALK ENTER
        document.getElementById('target-search').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                geocoder.geocode(e.target.value, (res) => {
                    if (res.length > 0) {
                        const target = res[0].center;
                        calculateRoute(target.lat, target.lng);
                    }
                });
            }
        });
    </script>
</body>
</html>
