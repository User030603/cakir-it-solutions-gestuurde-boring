<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cakir Logistics | Ultimate Control Center</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css"/>

    <style>
        :root {
            --bg: #0b0f1a; --panel: #111827; --border: #1e2d45;
            --accent: #00d4ff; --green: #00e676; --red: #ff4444; --text: #e2e8f0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; }

        /* SIDEBAR */
        #sidebar { width: 380px; min-width: 380px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 1000; }
        .brand { padding: 24px 20px; background: linear-gradient(135deg, #0f1d30 0%, #0b1525 100%); border-bottom: 1px solid var(--border); }
        
        .stats-row { display: flex; padding: 15px; gap: 8px; border-bottom: 1px solid var(--border); }
        .stat-box { flex: 1; background: #1a2235; border: 1px solid var(--border); border-radius: 8px; padding: 8px; text-align: center; }
        .stat-val { font-family: 'IBM Plex Mono'; font-size: 18px; font-weight: 700; color: var(--accent); }
        .stat-lbl { font-size: 8px; text-transform: uppercase; color: #64748b; }

        /* DRIVER CARDS */
        .driver-list { flex: 1; overflow-y: auto; padding: 12px; }
        .driver-card {
            background: #1a2235; border: 1px solid var(--border); border-radius: 12px;
            padding: 14px; margin-bottom: 10px; transition: 0.2s; position: relative;
        }
        .driver-card.active { border-color: var(--accent); background: #162033; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        
        .route-btn-small {
            background: var(--accent); color: #000; border: none; padding: 5px 10px;
            border-radius: 4px; font-size: 10px; font-weight: bold; cursor: pointer;
        }

        /* STATUS BAR (Replacement for alert) */
        #status-bar {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 1100; background: rgba(0,0,0,0.85); color: white; padding: 10px 20px;
            border-radius: 50px; font-size: 13px; border: 1px solid var(--accent);
            display: none; box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* MAP */
        #map { flex: 1; position: relative; }
        .map-tools { position: absolute; right: 20px; bottom: 40px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; }
        .tool-btn { width: 42px; height: 42px; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; color: white; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }

        /* PULSING DOT FOR ME */
        .pulse-me {
            width: 12px; height: 12px; background: #2196f3; border: 2px solid white;
            border-radius: 50%; box-shadow: 0 0 0 rgba(33, 150, 243, 0.4);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0px rgba(33, 150, 243, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(33, 150, 243, 0); } 100% { box-shadow: 0 0 0 0px rgba(33, 150, 243, 0); } }

        #route-panel { border-top: 1px solid var(--border); background: #0a1520; max-height: 0; overflow: hidden; transition: 0.4s; }
        #route-panel.open { max-height: 200px; padding: 16px 20px; }
    </style>
</head>
<body>

<div id="status-bar"></div>

<div id="sidebar">
    <div class="brand">
        <h2 style="font-family: 'IBM Plex Mono'; font-size: 18px; color: var(--accent);">CAKIR LOGISTICS</h2>
        <p style="font-size: 10px; opacity: 0.5;">REAL-TIME DISPATCH V8</p>
    </div>

    <div class="stats-row">
        <div class="stat-box"><div class="stat-val" id="stat-active">0</div><div class="stat-lbl">Totaal</div></div>
        <div class="stat-box"><div class="stat-val" id="stat-rijdend" style="color:var(--green)">0</div><div class="stat-lbl">Rijdend</div></div>
        <div class="stat-box"><div class="stat-val" id="stat-sos" style="color:var(--red)">0</div><div class="stat-lbl">SOS</div></div>
    </div>

    <div class="driver-list" id="driver-list"></div>

    <div id="route-panel">
        <div style="font-size: 10px; color: var(--accent); margin-bottom: 10px;">> ROUTE INFO (VAN MIJ NAAR CHAUFFEUR)</div>
        <div style="display:flex; gap: 20px; margin-bottom: 12px;">
            <div><div class="stat-val" id="route-time">--</div><div class="stat-lbl">Tijd</div></div>
            <div><div class="stat-val" id="route-dist">--</div><div class="stat-lbl">Afstand</div></div>
        </div>
        <button onclick="window.clearRoute()" style="width:100%; padding:8px; background:var(--border); border:none; color:white; border-radius:4px; cursor:pointer;">Route Wissen</button>
    </div>
</div>

<div id="map">
    <div class="map-tools">
        <button class="tool-btn" onclick="window.toggleSat()">🛰️</button>
        <button class="tool-btn" onclick="window.getMyLocation(true)">🎯</button>
        <button class="tool-btn" onclick="window.map.zoomIn()">+</button>
        <button class="tool-btn" onclick="window.map.zoomOut()">-</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        databaseURL: "https://cakir-logistics-tracker-c4b6b-default-rtdb.europe-west1.firebasedatabase.app/"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Globals
    window.map = L.map('map', { center: [51.0654, 4.0289], zoom: 10, zoomControl: false, attributionControl: false });
    const darkLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(window.map);
    const satLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');
    
    let myLocation = null;
    let myMarker = null;
    let routeControl = null;
    const markers = {};
    const driverCoords = {};

    // UI Feedback function
    window.setStatus = (msg, isError = false) => {
        const bar = document.getElementById('status-bar');
        bar.innerText = msg;
        bar.style.display = 'block';
        bar.style.borderColor = isError ? 'red' : '#00d4ff';
        if(!isError) setTimeout(() => bar.style.display = 'none', 5000);
    };

    // 🎯 Geolocation logic
    window.getMyLocation = (focus = false) => {
        if (!navigator.geolocation) return window.setStatus("Browser ondersteunt geen GPS", true);

        navigator.geolocation.getCurrentPosition(
            (pos) => {
                myLocation = [pos.coords.latitude, pos.coords.longitude];
                const pulseIcon = L.divIcon({ className: '', html: '<div class="pulse-me"></div>' });

                if (myMarker) {
                    myMarker.setLatLng(myLocation);
                } else {
                    myMarker = L.marker(myLocation, { icon: pulseIcon }).addTo(window.map).bindPopup("Jij bent hier");
                }
                if (focus) window.map.flyTo(myLocation, 15);
            },
            (err) => {
                if (err.code === 1) {
                    window.setStatus("Sta locatie toe via het 🔒 slotje in je adresbalk → Locatie → Toestaan", true);
                } else {
                    window.setStatus("GPS Fout: " + err.message, true);
                }
            },
            { enableHighAccuracy: true }
        );
    };

    // 🚛 Route from ME to DRIVER
    window.routeToDriver = (id) => {
        if (!myLocation) {
            window.setStatus("Uw locatie wordt opgehaald, probeer over 2 seconden opnieuw...");
            window.getMyLocation();
            return;
        }
        if (!driverCoords[id]) return;

        if (routeControl) window.map.removeControl(routeControl);

        routeControl = L.Routing.control({
            waypoints: [
                L.latLng(myLocation[0], myLocation[1]),
                L.latLng(driverCoords[id][0], driverCoords[id][1])
            ],
            lineOptions: { styles: [{ color: '#00d4ff', weight: 6, opacity: 0.8 }] },
            createMarker: () => null
        }).addTo(window.map);

        routeControl.on('routesfound', (e) => {
            const r = e.routes[0].summary;
            document.getElementById('route-time').innerText = Math.round(r.totalTime / 60) + "m";
            document.getElementById('route-dist').innerText = (r.totalDistance / 1000).toFixed(1) + "km";
            document.getElementById('route-panel').classList.add('open');
        });
    };

    window.clearRoute = () => {
        if (routeControl) window.map.removeControl(routeControl);
        document.getElementById('route-panel').classList.remove('open');
    };

    window.toggleSat = () => {
        if (window.map.hasLayer(darkLayer)) { window.map.removeLayer(darkLayer); satLayer.addTo(window.map); }
        else { window.map.removeLayer(satLayer); darkLayer.addTo(window.map); }
    };

    // 🔥 Sync Firebase
    onValue(ref(db, '/'), (snapshot) => {
        const data = snapshot.val() || {};
        const tracking = data.tracking || {};
        const meldingen = data.meldingen || {};
        const list = document.getElementById('driver-list');
        list.innerHTML = "";

        let dCount = 0, rCount = 0, sCount = 0;

        for (let id in tracking) {
            if (id === "1" || id === "Gast_User") continue;
            dCount++;
            const loc = tracking[id];
            const info = meldingen[id] || { naam: "Chauffeur", status: "STANDBY" };
            driverCoords[id] = [loc.latitude, loc.longitude];

            if (info.status === "START_RIT") rCount++;
            if (info.status === "SOS") sCount++;

            // Marker
            const color = info.status === "SOS" ? "#ff4444" : (info.status === "START_RIT" ? "#00e676" : "#ffea00");
            const icon = L.divIcon({
                html: `<div style="background:${color}; width:28px; height:28px; border-radius:50%; border:2px solid white; box-shadow:0 0 10px ${color}; display:flex; align-items:center; justify-content:center; color:black; font-weight:bold; font-size:9px;">TRK</div>`,
                className: ''
            });

            if (markers[id]) {
                markers[id].setLatLng(driverCoords[id]).setIcon(icon);
            } else {
                markers[id] = L.marker(driverCoords[id], { icon }).addTo(window.map).bindPopup(`<b>${info.naam}</b>`);
            }

            // List UI
            const card = document.createElement('div');
            card.className = `driver-card ${info.status === 'SOS' ? 'active' : ''}`;
            card.innerHTML = `
                <div class="card-header">
                    <strong>${info.naam}</strong>
                    <button class="route-btn-small" onclick="window.routeToDriver('${id}')">ROUTE</button>
                </div>
                <div style="font-size:11px; color:#94a3b8;">Status: ${info.status}</div>
            `;
            list.appendChild(card);
        }
        document.getElementById('stat-active').innerText = dCount;
        document.getElementById('stat-rijdend').innerText = rCount;
        document.getElementById('stat-sos').innerText = sCount;
    });

    // Start geolocation on load
    window.getMyLocation();
</script>

</body>
</html>
