<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cakir Logistics | Ultimate Command Center</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #002d5b; --accent: #0056b3; --sos: #ff0000; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        
        /* Sidebar Styling */
        .admin-sidebar {
            position: absolute; top: 0; left: 0; z-index: 1000;
            width: 360px; height: 100vh; background: white;
            box-shadow: 5px 0 20px rgba(0,0,0,0.15); display: flex; flex-direction: column;
        }

        .header { padding: 25px; background: var(--primary); color: white; text-align: center; }
        .stats-bar { display: flex; justify-content: space-around; padding: 15px; background: #e9ecef; border-bottom: 1px solid #dee2e6; }
        .stat-item { text-align: center; }
        .stat-num { display: block; font-size: 18px; font-weight: bold; color: var(--primary); }
        .stat-lbl { font-size: 10px; text-transform: uppercase; color: #666; }

        .driver-list { flex: 1; overflow-y: auto; padding: 15px; }
        .driver-card {
            background: #fff; padding: 15px; border-radius: 12px;
            margin-bottom: 15px; border: 1px solid #eee; cursor: pointer;
            transition: all 0.3s ease;
        }
        .driver-card:hover { border-color: var(--accent); background: #f8faff; transform: translateX(5px); }
        .driver-card.active-focus { border-left: 5px solid var(--accent); background: #f0f7ff; }

        /* Status Badges */
        .badge { float: right; font-size: 10px; padding: 4px 10px; border-radius: 50px; color: white; font-weight: bold; }
        .status-start_rit { background: #28a745; }
        .status-pauze { background: #ffc107; color: #333; }
        .status-sos { background: var(--sos); animation: blink 0.8s infinite; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; font-size: 12px; }
        .info-label { color: #888; display: block; }
        .info-value { font-weight: 600; color: #333; }
    </style>
</head>
<body>

    <div class="admin-sidebar">
        <div class="header">
            <h2 style="margin:0;">Fleet Command</h2>
            <div style="font-size: 11px; opacity: 0.7;">CAKIR IT SOLUTIONS LOGISTICS</div>
        </div>

        <div class="stats-bar">
            <div class="stat-item"><span class="stat-num" id="total-v">0</span><span class="stat-lbl">Totaal</span></div>
            <div class="stat-item"><span class="stat-num" id="active-v" style="color: #28a745;">0</span><span class="stat-lbl">Rijdend</span></div>
            <div class="stat-item"><span class="stat-num" id="sos-v" style="color: red;">0</span><span class="stat-lbl">SOS</span></div>
        </div>

        <div class="driver-list" id="list">
            </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "JOUW_KEY",
            databaseURL: "https://cakir-logistics-tracker-c4b6b-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "cakir-logistics-tracker"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const map = L.map('map', { zoomControl: false }).setView([51.0654, 4.0289], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        const markers = {};
        const routes = {}; // Hier slaan we de stippellijnen op

        // GLOBALE FOCUS FUNCTIE
        window.inspectDriver = (lat, lon, id) => {
            map.flyTo([lat, lon], 16, { duration: 1.5 });
            if(markers[id]) markers[id].openPopup();
            
            // Highlight de kaart in de lijst
            document.querySelectorAll('.driver-card').forEach(c => c.classList.remove('active-focus'));
            event.currentTarget.classList.add('active-focus');
        };

        function formatDuration(ts) {
            if(!ts) return "0m";
            const diff = Math.floor((Date.now() - ts) / 60000);
            return diff < 60 ? diff + "m" : Math.floor(diff/60) + "u " + (diff%60) + "m";
        }

        onValue(ref(db, '/'), (snapshot) => {
            const data = snapshot.val() || {};
            const tracking = data.tracking || {};
            const meldingen = data.meldingen || {};
            const listContainer = document.getElementById('list');
            
            let countT = 0, countA = 0, countS = 0;
            listContainer.innerHTML = "";

            for (let id in tracking) {
                if (id === "1" || id === "Gast_User") continue;
                countT++;

                const loc = tracking[id];
                const info = meldingen[id] || { naam: "Chauffeur", status: "ONLINE", timestamp: Date.now() };
                
                if(info.status === "START_RIT") countA++;
                if(info.status === "SOS") countS++;

                // 1. UPDATE MARKER
                if (markers[id]) {
                    markers[id].setLatLng([loc.latitude, loc.longitude]);
                } else {
                    markers[id] = L.marker([loc.latitude, loc.longitude]).addTo(map).bindPopup(`<b>${info.naam}</b>`);
                }

                // 2. UPDATE ROUTE STIPPELLIJN (Gemaakte afstand)
                if (!routes[id]) {
                    routes[id] = L.polyline([], {
                        color: '#0056b3',
                        dashArray: '10, 10', // Dit maakt de stippellijn
                        weight: 3,
                        opacity: 0.6
                    }).addTo(map);
                }
                routes[id].addLatLng([loc.latitude, loc.longitude]);

                // 3. UI CARD BOUWEN
                const startTime = new Date(info.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                const statusClass = "status-" + info.status.toLowerCase();

                listContainer.innerHTML += `
                    <div class="driver-card" onclick="inspectDriver(${loc.latitude}, ${loc.longitude}, '${id}')">
                        <span class="badge ${statusClass}">${info.status}</span>
                        <div class="driver-name">${info.naam}</div>
                        
                        <div class="info-grid">
                            <div><span class="info-label">Starttijd</span><span class="info-value">${startTime}</span></div>
                            <div><span class="info-label">Duur</span><span class="info-value">${formatDuration(info.timestamp)}</span></div>
                            <div><span class="info-label">Latitude</span><span class="info-value">${loc.latitude.toFixed(4)}</span></div>
                            <div><span class="info-label">Longitude</span><span class="info-value">${loc.longitude.toFixed(4)}</span></div>
                        </div>
                    </div>`;
            }
            document.getElementById('total-v').innerText = countT;
            document.getElementById('active-v').innerText = countA;
            document.getElementById('sos-v').innerText = countS;
        });
    </script>
</body>
</html>
