<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cakir Logistics | Fleet Command</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css"/>
<style>
  :root {
    --bg:#0b0f1a; --panel:#111827; --panel2:#1a2235; --border:#1e2d45;
    --accent:#00d4ff; --green:#00e676; --yellow:#ffea00; --red:#ff4444;
    --text:#e2e8f0; --muted:#64748b; --sidebar:375px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'IBM Plex Sans',sans-serif; background:var(--bg); color:var(--text); height:100vh; overflow:hidden; display:flex; }

  #sidebar { width:var(--sidebar); min-width:var(--sidebar); height:100vh; background:var(--panel); border-right:1px solid var(--border); display:flex; flex-direction:column; z-index:1000; box-shadow:10px 0 40px rgba(0,0,0,0.6); }

  .brand { padding:20px; background:linear-gradient(135deg,#0f1d30,#0b1525); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; }
  .brand-icon { width:42px; height:42px; background:var(--accent); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:22px; box-shadow:0 0 20px rgba(0,212,255,0.5); flex-shrink:0; }
  .brand-name { font-family:'IBM Plex Mono',monospace; font-size:15px; font-weight:700; color:white; }
  .brand-sub  { font-size:10px; color:var(--accent); letter-spacing:2px; margin-top:3px; }

  .stats-row { display:flex; padding:14px 16px; gap:10px; border-bottom:1px solid var(--border); }
  .stat { flex:1; background:var(--panel2); border:1px solid var(--border); border-radius:8px; padding:10px; text-align:center; }
  .stat-val { font-family:'IBM Plex Mono',monospace; font-size:22px; font-weight:700; color:var(--accent); }
  .stat-lbl { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; margin-top:3px; }

  #loc-bar { padding:9px 16px; border-bottom:1px solid var(--border); font-size:11px; font-family:'IBM Plex Mono',monospace; display:flex; align-items:center; gap:8px; min-height:36px; transition:color 0.4s; }
  #loc-bar .dot { width:8px; height:8px; border-radius:50%; background:var(--muted); flex-shrink:0; transition:all 0.3s; }
  #loc-bar.found  { color:var(--green); }
  #loc-bar.found .dot  { background:var(--green); box-shadow:0 0 7px var(--green); }
  #loc-bar.error  { color:var(--red); }
  #loc-bar.error .dot  { background:var(--red); }
  #loc-bar.searching .dot { background:var(--yellow); animation:blink 0.8s infinite; }

  .search-wrap { padding:12px 16px; border-bottom:1px solid var(--border); }
  .search-inner { background:var(--panel2); border:1px solid var(--border); border-radius:8px; display:flex; align-items:center; padding:0 12px; gap:8px; transition:border-color 0.2s; }
  .search-inner:focus-within { border-color:var(--accent); }
  .search-inner input { background:none; border:none; outline:none; color:var(--text); font-size:13px; padding:9px 0; flex:1; font-family:'IBM Plex Sans',sans-serif; }
  .search-inner input::placeholder { color:var(--muted); }

  .list-header { padding:8px 16px 4px; font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.15em; font-family:'IBM Plex Mono',monospace; display:flex; justify-content:space-between; align-items:center; }
  .live-dot { width:6px; height:6px; border-radius:50%; background:var(--green); display:inline-block; box-shadow:0 0 6px var(--green); animation:pulse 1.5s infinite; }

  #driver-list { flex:1; overflow-y:auto; padding:8px 12px 12px; }
  #driver-list::-webkit-scrollbar { width:3px; }
  #driver-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  .driver-card { background:var(--panel2); border:1px solid var(--border); border-radius:10px; padding:12px 14px; margin-bottom:8px; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; gap:12px; position:relative; overflow:hidden; }
  .driver-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--muted); }
  .driver-card:hover { border-color:#2a3f5f; }
  .driver-card.active { border-color:var(--accent); background:#0f1e33; }
  .driver-card.s-start_rit::before, .driver-card.s-rijden::before { background:var(--green); box-shadow:0 0 8px var(--green); }
  .driver-card.s-standby::before, .driver-card.s-wachten::before { background:var(--yellow); }
  .driver-card.s-sos::before { background:var(--red); box-shadow:0 0 12px var(--red); animation:blink 0.8s infinite; }
  .driver-card.s-pauze::before { background:var(--yellow); }

  .d-avatar { width:38px; height:38px; border-radius:9px; background:linear-gradient(135deg,#1e3a5f,#0a1e35); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:13px; color:var(--accent); flex-shrink:0; }
  .d-info { flex:1; min-width:0; }
  .d-name { font-weight:600; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .d-meta { font-size:11px; color:var(--muted); margin-top:3px; }
  .s-badge { padding:2px 7px; border-radius:4px; font-size:10px; font-family:'IBM Plex Mono',monospace; display:inline-block; }
  .sb-green  { background:rgba(0,230,118,0.15); color:var(--green); }
  .sb-yellow { background:rgba(255,234,0,0.12);  color:var(--yellow); }
  .sb-red    { background:rgba(255,68,68,0.15);   color:var(--red); }

  .route-btn { background:var(--accent); color:#000; border:none; border-radius:5px; padding:5px 10px; font-size:10px; font-weight:700; cursor:pointer; font-family:'IBM Plex Sans',sans-serif; white-space:nowrap; flex-shrink:0; transition:background 0.2s; }
  .route-btn:hover { background:#00b8e0; }

  /* Route panel */
  #route-panel { border-top:1px solid var(--border); background:#0a1520; max-height:0; overflow:hidden; transition:max-height 0.5s ease; }
  #route-panel.open { max-height:600px; padding:16px 18px; overflow-y:auto; }
  #route-panel::-webkit-scrollbar { width:3px; }
  #route-panel::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  .r-title { font-size:10px; text-transform:uppercase; letter-spacing:0.15em; color:var(--muted); font-family:'IBM Plex Mono',monospace; margin-bottom:10px; }

  /* Route alternatieven tabs */
  #route-tabs { display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap; }
  .route-tab {
    flex:1; min-width:80px; padding:8px 6px; border-radius:8px;
    border:1px solid var(--border); background:var(--panel2);
    cursor:pointer; transition:all 0.2s; text-align:center;
  }
  .route-tab:hover { border-color:var(--accent); }
  .route-tab.active { border-color:var(--accent); background:#0f1e33; }
  .route-tab.active .rt-label { color:var(--accent); }
  .rt-label { font-family:'IBM Plex Mono',monospace; font-size:10px; font-weight:700; color:var(--muted); margin-bottom:4px; }
  .rt-time  { font-family:'IBM Plex Mono',monospace; font-size:16px; font-weight:700; color:var(--text); }
  .rt-dist  { font-size:10px; color:var(--muted); margin-top:2px; }
  .rt-tag   { font-size:9px; padding:2px 6px; border-radius:3px; margin-top:4px; display:inline-block; font-family:'IBM Plex Mono',monospace; }
  .tag-fast { background:rgba(0,230,118,0.15); color:var(--green); }
  .tag-alt  { background:rgba(255,234,0,0.12); color:var(--yellow); }
  .tag-eco  { background:rgba(0,212,255,0.12); color:var(--accent); }

  /* Geselecteerde route stats */
  .r-stats { display:flex; gap:16px; margin-bottom:14px; padding:12px; background:var(--panel2); border-radius:8px; border:1px solid var(--border); }
  .r-val { font-family:'IBM Plex Mono',monospace; font-size:18px; font-weight:700; color:var(--accent); }
  .r-lbl { font-size:10px; color:var(--muted); margin-top:2px; }

  .r-actions { display:flex; gap:8px; margin-bottom:14px; }
  .r-btn { flex:1; padding:7px; background:var(--panel2); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:12px; cursor:pointer; font-family:'IBM Plex Sans',sans-serif; transition:all 0.2s; }
  .r-btn:hover { border-color:var(--accent); color:var(--accent); }
  .r-btn.primary { background:var(--accent); color:#000; border-color:var(--accent); font-weight:700; }

  /* Instructies */
  .instr-title { font-size:10px; text-transform:uppercase; letter-spacing:0.12em; color:var(--muted); font-family:'IBM Plex Mono',monospace; margin-bottom:8px; padding-top:4px; border-top:1px solid var(--border); padding-top:12px; }
  .instr-item { display:flex; align-items:flex-start; gap:10px; padding:8px 10px; border-radius:7px; margin-bottom:5px; background:var(--panel2); border:1px solid var(--border); font-size:12px; line-height:1.4; }
  .instr-icon { font-size:15px; flex-shrink:0; width:20px; text-align:center; }
  .instr-text { flex:1; color:var(--text); }
  .instr-dist { font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--accent); margin-top:2px; }

  /* MAP */
  #map { flex:1; height:100vh; position:relative; }

  /* Layer bar */
  #layer-bar {
    position:absolute; top:14px; left:50%; transform:translateX(-50%);
    z-index:900; display:flex; gap:4px;
    background:var(--panel); border:1px solid var(--border);
    border-radius:10px; padding:5px 7px;
    box-shadow:0 4px 20px rgba(0,0,0,0.5);
  }
  .layer-btn { padding:5px 11px; border-radius:6px; border:1px solid transparent; background:transparent; color:var(--muted); font-size:11px; font-weight:600; font-family:'IBM Plex Mono',monospace; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
  .layer-btn:hover { color:var(--text); border-color:var(--border); }
  .layer-btn.on { background:var(--panel2); border-color:var(--accent); color:var(--accent); }
  .layer-sep { width:1px; background:var(--border); margin:3px 2px; }

  #hint-bar { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); z-index:900; background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:8px 18px; font-size:12px; font-family:'IBM Plex Mono',monospace; color:var(--muted); pointer-events:none; transition:opacity 0.5s; box-shadow:0 4px 20px rgba(0,0,0,0.4); white-space:nowrap; max-width:80%; overflow:hidden; text-overflow:ellipsis; }

  .map-tools { position:absolute; right:16px; top:50%; transform:translateY(-50%); z-index:900; display:flex; flex-direction:column; gap:8px; }
  .ctrl-btn { width:40px; height:40px; background:var(--panel); border:1px solid var(--border); border-radius:9px; color:var(--text); font-size:17px; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 12px rgba(0,0,0,0.5); transition:all 0.2s; }
  .ctrl-btn:hover { border-color:var(--accent); color:var(--accent); }
  .ctrl-btn.on { border-color:var(--accent); color:var(--accent); box-shadow:0 0 10px rgba(0,212,255,0.3); }

  .leaflet-container { background:#0b0f1a !important; }
  .leaflet-routing-container { display:none !important; }
  .leaflet-popup-content-wrapper { background:var(--panel) !important; color:var(--text) !important; border:1px solid var(--border) !important; border-radius:10px !important; box-shadow:0 4px 24px rgba(0,0,0,0.6) !important; }
  .leaflet-popup-tip { background:var(--panel) !important; }
  .leaflet-popup-content { margin:14px 16px !important; font-family:'IBM Plex Sans',sans-serif; font-size:13px; }

  #loading { position:fixed; inset:0; background:var(--bg); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; transition:opacity 0.6s; }

  @keyframes spin  { to { transform:rotate(360deg); } }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
</style>
</head>
<body>

<div id="loading">
  <div style="font-size:50px;animation:spin 2s linear infinite;">🛰️</div>
  <p style="margin-top:20px;font-family:'IBM Plex Mono';color:var(--accent);letter-spacing:0.1em;">CAKIR LOGISTICS: BOOTING...</p>
</div>

<div id="sidebar">
  <div class="brand">
    <div class="brand-icon">🚛</div>
    <div>
      <div class="brand-name">CAKIR LOGISTICS</div>
      <div class="brand-sub">FLEET COMMAND</div>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat"><div class="stat-val" id="s-total">0</div><div class="stat-lbl">Vloot</div></div>
    <div class="stat"><div class="stat-val" id="s-rij" style="color:var(--green)">0</div><div class="stat-lbl">Rijdend</div></div>
    <div class="stat"><div class="stat-val" id="s-sos" style="color:var(--red)">0</div><div class="stat-lbl">SOS</div></div>
  </div>

  <div id="loc-bar" class="searching">
    <div class="dot"></div>
    <span id="loc-txt">Locatie ophalen...</span>
  </div>

  <div class="search-wrap">
    <div class="search-inner">
      <span style="color:var(--muted);font-size:14px;">🔍</span>
      <input type="text" id="search-input" placeholder="Zoek chauffeur...">
    </div>
  </div>

  <div class="list-header">
    <span>Live Voertuigen</span>
    <span><span class="live-dot"></span> LIVE</span>
  </div>

  <div id="driver-list"></div>

  <div id="route-panel">
    <div class="r-title">📍 Route — Jij → Chauffeur</div>

    <!-- Alternatieve routes tabs -->
    <div id="route-tabs"></div>

    <!-- Geselecteerde route info -->
    <div class="r-stats">
      <div><div class="r-val" id="r-time">--</div><div class="r-lbl">Reistijd</div></div>
      <div><div class="r-val" id="r-dist">--</div><div class="r-lbl">Afstand</div></div>
      <div><div class="r-val" id="r-eta">--:--</div><div class="r-lbl">Aankomst</div></div>
    </div>

    <div class="r-actions">
      <button class="r-btn" onclick="clearRoute()">✕ Wissen</button>
      <button class="r-btn primary" onclick="focusDriver()">🎯 Focus</button>
    </div>

    <div class="instr-title">🗺️ Stap-voor-stap instructies</div>
    <div id="instr-list"></div>
  </div>
</div>

<div id="map">
  <div id="layer-bar">
    <button class="layer-btn on" id="lb-dark"    onclick="setLayer('dark')">⚫ Dark</button>
    <div class="layer-sep"></div>
    <button class="layer-btn"   id="lb-light"   onclick="setLayer('light')">⚪ Licht</button>
    <div class="layer-sep"></div>
    <button class="layer-btn"   id="lb-sat"     onclick="setLayer('sat')">🛰️ Satelliet</button>
    <div class="layer-sep"></div>
    <!-- Traffic = gratis overlay zonder externe API key -->
    <button class="layer-btn"   id="lb-traffic" onclick="toggleTraffic()">🚦 Traffic</button>
  </div>

  <div id="hint-bar">Verbinden met Firebase...</div>

  <div class="map-tools">
    <button class="ctrl-btn" id="btn-loc" onclick="centerMyLoc()">🎯</button>
    <button class="ctrl-btn" onclick="map.setZoom(map.getZoom()+1)">+</button>
    <button class="ctrl-btn" onclick="map.setZoom(map.getZoom()-1)">−</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// ════════════════════════════════════════════════════
//  ⚠️  Vervang JOUW_API_KEY_HIER met je Firebase key
// ════════════════════════════════════════════════════
firebase.initializeApp({
  apiKey:      "https://console.firebase.google.com/u/0/project/cakir-logistics-tracker-c4b6b/database/cakir-logistics-tracker-c4b6b-default-rtdb/data/~2F",
  databaseURL: "https://cakir-logistics-tracker-c4b6b-default-rtdb.europe-west1.firebasedatabase.app/",
  projectId:   "cakir-logistics-tracker-c4b6b"
});
const db = firebase.database();

// ── MAP ──────────────────────────────────────────────
const map = L.map('map', { center:[51.0654,4.0289], zoom:11, zoomControl:false, attributionControl:false });
L.control.attribution({ prefix:'© OpenStreetMap | Cakir Logistics', position:'bottomright' }).addTo(map);

// Basislagen — 100% gratis, geen API key, geen referer blokkering
const BASE = {
  dark:  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',            { maxZoom:20 }),
  light: L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { maxZoom:20 }),
  sat:   L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom:20 })
};

// Traffic overlay — 100% gratis via OpenStreetMap-based tile
// Toont wegen in kleur bovenop elke basislaag (geen Google/Stadia key nodig)
const TRAFFIC_OVERLAY = L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/rastertiles/voyager_only_labels/{z}/{x}/{y}{r}.png',
  { maxZoom:20, opacity:0.7, zIndex:500 }
);

let currentLayer = 'dark';
let trafficOn    = false;
BASE.dark.addTo(map);

function setLayer(name) {
  map.removeLayer(BASE[currentLayer]);
  BASE[name].addTo(map);
  if (trafficOn) { map.removeLayer(TRAFFIC_OVERLAY); TRAFFIC_OVERLAY.addTo(map); }
  currentLayer = name;
  ['dark','light','sat'].forEach(function(n) {
    document.getElementById('lb-' + n).classList.toggle('on', n === name);
  });
}

function toggleTraffic() {
  trafficOn = !trafficOn;
  if (trafficOn) TRAFFIC_OVERLAY.addTo(map);
  else map.removeLayer(TRAFFIC_OVERLAY);
  document.getElementById('lb-traffic').classList.toggle('on', trafficOn);
  hint(trafficOn ? '🚦 Traffic labels aan' : '🚦 Traffic labels uit', 3000);
}

// ── STATE ─────────────────────────────────────────────
var myLocation    = null;
var myMarker      = null;
var myCircle      = null;
var selectedId    = null;
var routeControl  = null;
var allRoutes     = [];      // opgeslagen alternatieve routes
var activeRouteIdx = 0;      // welke route is actief
var routeLines    = [];      // polylines op kaart per route
const markers     = {};
const driverData  = {};

// Route kleuren per alternatief
var ROUTE_COLORS = ['#00d4ff', '#00e676', '#ffea00', '#ff9800'];
var ROUTE_LABELS = [
  { label:'⚡ Snelste',  tag:'tag-fast', tagText:'Snelste' },
  { label:'🌿 Zuinigst', tag:'tag-eco',  tagText:'Minste diesel' },
  { label:'🔀 Alternatief', tag:'tag-alt', tagText:'Alternatief' },
  { label:'🔀 Alt. 2',   tag:'tag-alt',  tagText:'Alternatief' }
];

// ── HINT ──────────────────────────────────────────────
var hintTimer = null;
function hint(msg, ms) {
  var el = document.getElementById('hint-bar');
  el.textContent = msg;
  el.style.opacity = '1';
  clearTimeout(hintTimer);
  if (ms) hintTimer = setTimeout(function(){ el.style.opacity = '0'; }, ms);
}

// ── GEOLOCATION ───────────────────────────────────────
function startGeolocation() {
  var bar = document.getElementById('loc-bar');
  var txt = document.getElementById('loc-txt');
  if (!navigator.geolocation) {
    bar.className = 'error'; txt.textContent = 'Geolocatie niet beschikbaar.'; return;
  }
  bar.className = 'searching'; txt.textContent = 'Locatie ophalen...';
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      var lat = pos.coords.latitude, lng = pos.coords.longitude;
      var acc = Math.round(pos.coords.accuracy);
      myLocation = [lat, lng];
      var myIcon = L.divIcon({
        html: '<div style="width:18px;height:18px;background:#00d4ff;border-radius:50%;border:3px solid white;box-shadow:0 0 0 6px rgba(0,212,255,0.2),0 0 20px rgba(0,212,255,0.7);"></div>',
        iconSize:[18,18], iconAnchor:[9,9], className:''
      });
      if (myMarker) myMarker.setLatLng(myLocation);
      else myMarker = L.marker(myLocation, { icon:myIcon, zIndexOffset:500 }).addTo(map)
        .bindPopup('<b style="color:#00d4ff">📍 Jouw locatie</b><br><small>±' + acc + 'm</small>');
      if (myCircle) map.removeLayer(myCircle);
      myCircle = L.circle(myLocation, { radius:acc, color:'#00d4ff', fillColor:'#00d4ff', fillOpacity:0.07, weight:1 }).addTo(map);
      bar.className = 'found';
      txt.textContent = 'Locatie gevonden (±' + acc + 'm)';
      document.getElementById('btn-loc').classList.add('on');
      hint('✅ Locatie gevonden — klik 🏠 Route naast een chauffeur', 6000);
    },
    function(err) {
      bar.className = 'error';
      if (err.code === 1) txt.textContent = '⛔ Geweigerd — klik 🔒 adresbalk → Locatie → Toestaan → herlaad';
      else if (err.code === 2) txt.textContent = '⚠️ GPS niet beschikbaar';
      else txt.textContent = '⚠️ Timeout — herlaad pagina';
      hint('⛔ Locatie geblokkeerd — klik 🔒 adresbalk → Locatie → Toestaan', 0);
    },
    { enableHighAccuracy:true, timeout:12000, maximumAge:0 }
  );
}

function centerMyLoc() {
  if (myLocation) { map.flyTo(myLocation, 16, { duration:1.2 }); if (myMarker) myMarker.openPopup(); }
  else startGeolocation();
}

// ── ICONS ─────────────────────────────────────────────
function truckIcon(status, selected) {
  var color = status === 'SOS' ? '#ff4444'
    : (status === 'START_RIT' || status === 'rijden') ? '#00e676'
    : '#ffea00';
  var sz = selected ? 44 : 34;
  return L.divIcon({
    html: '<div style="width:' + sz + 'px;height:' + sz + 'px;background:' + color + ';border-radius:' + (selected?'11px':'50%') + ';border:2px solid white;box-shadow:0 0 ' + (selected?16:8) + 'px ' + color + '99;display:flex;align-items:center;justify-content:center;font-size:' + (selected?19:14) + 'px;">🚛</div>'
         + '<div style="background:#111827;color:' + color + ';border-radius:3px;padding:1px 5px;font-size:9px;font-family:monospace;font-weight:bold;text-align:center;margin-top:2px;white-space:nowrap;">' + status + '</div>',
    iconSize:[sz, sz+14], iconAnchor:[sz/2, sz/2], className:''
  });
}

function badge(status) {
  var cls = (status === 'SOS' || status === 'pauze') ? 'sb-red'
    : (status === 'START_RIT' || status === 'rijden') ? 'sb-green'
    : 'sb-yellow';
  return '<span class="s-badge ' + cls + '">' + status + '</span>';
}

// ── SELECT DRIVER ─────────────────────────────────────
function selectDriver(id) {
  selectedId = id;
  Object.keys(markers).forEach(function(k) {
    if (driverData[k]) markers[k].setIcon(truckIcon(driverData[k].status, k === id));
  });
  document.querySelectorAll('.driver-card').forEach(function(c){ c.classList.remove('active'); });
  var card = document.getElementById('card-' + id);
  if (card) { card.classList.add('active'); card.scrollIntoView({ behavior:'smooth', block:'nearest' }); }
  var d = driverData[id];
  if (d) map.flyTo([d.lat, d.lng], 15, { duration:1.2 });
}

// ── INSTRUCTIE ICONEN ─────────────────────────────────
function instrIcon(type) {
  var t = (type || '').toLowerCase();
  if (t === 'sharp left')   return '↰';
  if (t === 'sharp right')  return '↱';
  if (t === 'left')         return '⬅️';
  if (t === 'right')        return '➡️';
  if (t === 'slight left')  return '↖️';
  if (t === 'slight right') return '↗️';
  if (t.indexOf('roundabout') !== -1) return '🔄';
  if (t === 'u-turn')       return '↩️';
  if (t === 'destination arrived') return '🏁';
  if (t === 'waypoint reached')    return '📍';
  if (t === 'straight')     return '⬆️';
  if (t === 'depart')       return '🚀';
  return '▶️';
}

function formatDist(m) {
  return m >= 1000 ? (m / 1000).toFixed(1) + ' km' : Math.round(m) + ' m';
}

function formatTime(secs) {
  var m = Math.round(secs / 60);
  return m < 60 ? m + ' min' : Math.floor(m/60) + 'u ' + (m%60) + 'm';
}

// ── TOON ALTERNATIEVE ROUTES TABS ─────────────────────
function renderRouteTabs(routes) {
  var tabs = document.getElementById('route-tabs');
  tabs.innerHTML = '';

  // Sorteer: eerste = snelste (minste tijd)
  // tweede = zuinigste (kortste afstand = minste diesel)
  // rest = alternatieven
  routes.sort(function(a, b) { return a.summary.totalTime - b.summary.totalTime; });

  routes.forEach(function(route, i) {
    var info  = ROUTE_LABELS[i] || ROUTE_LABELS[2];
    var km    = (route.summary.totalDistance / 1000).toFixed(1);
    var time  = formatTime(route.summary.totalTime);
    var tab   = document.createElement('div');
    tab.className = 'route-tab' + (i === 0 ? ' active' : '');
    tab.id = 'tab-' + i;
    tab.innerHTML =
      '<div class="rt-label">' + info.label + '</div>' +
      '<div class="rt-time">' + time + '</div>' +
      '<div class="rt-dist">' + km + ' km</div>' +
      '<div class="rt-tag ' + info.tag + '">' + info.tagText + '</div>';
    tab.onclick = (function(idx){ return function(){ activateRoute(idx); }; })(i);
    tabs.appendChild(tab);
  });
}

// ── ACTIVEER EEN SPECIFIEKE ROUTE ─────────────────────
function activateRoute(idx) {
  activeRouteIdx = idx;

  // Tabs updaten
  document.querySelectorAll('.route-tab').forEach(function(t, i) {
    t.classList.toggle('active', i === idx);
  });

  // Lijnen op kaart updaten (actief = dik + kleur, anderen = dun + transparant)
  routeLines.forEach(function(poly, i) {
    if (i === idx) {
      poly.setStyle({ color: ROUTE_COLORS[0], weight:6, opacity:0.95 });
      poly.bringToFront();
    } else {
      poly.setStyle({ color: ROUTE_COLORS[i+1] || '#888', weight:3, opacity:0.4 });
    }
  });

  // Stats updaten
  var route = allRoutes[idx];
  var km    = (route.summary.totalDistance / 1000).toFixed(1);
  var mins  = Math.round(route.summary.totalTime / 60);
  var eta   = new Date(Date.now() + route.summary.totalTime * 1000).toTimeString().slice(0,5);
  document.getElementById('r-time').textContent = mins < 60 ? mins + ' min' : Math.floor(mins/60) + 'u ' + (mins%60) + 'm';
  document.getElementById('r-dist').textContent = km + ' km';
  document.getElementById('r-eta').textContent  = eta;

  // Instructies updaten
  renderInstructions(route.instructions || []);

  hint('✅ Route ' + (idx+1) + ': ' + km + ' km · ' + mins + ' min · aankomst ' + eta, 6000);
}

function renderInstructions(steps) {
  var box = document.getElementById('instr-list');
  box.innerHTML = '';
  if (!steps.length) {
    box.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:4px 0;">Geen instructies.</div>';
    return;
  }
  steps.forEach(function(step) {
    var div = document.createElement('div');
    div.className = 'instr-item';
    div.innerHTML =
      '<div class="instr-icon">' + instrIcon(step.type) + '</div>' +
      '<div style="flex:1;">' +
        '<div class="instr-text">' + step.text + '</div>' +
        (step.distance > 0 ? '<div class="instr-dist">' + formatDist(step.distance) + '</div>' : '') +
      '</div>';
    box.appendChild(div);
  });
}

// ── ROUTE: JIJ → CHAUFFEUR (met alternatieven) ────────
function routeToDriver(id) {
  selectDriver(id);
  var d = driverData[id];
  if (!d) return;
  if (!myLocation) {
    hint('🎯 Locatie ophalen...', 0);
    navigator.geolocation.getCurrentPosition(
      function(pos) {
        myLocation = [pos.coords.latitude, pos.coords.longitude];
        buildRoute(myLocation, [d.lat, d.lng], d.naam);
      },
      function() { hint('⛔ Locatie niet beschikbaar. Klik 🔒 adresbalk → Locatie → Toestaan.', 0); },
      { enableHighAccuracy:true, timeout:10000, maximumAge:0 }
    );
    return;
  }
  buildRoute(myLocation, [d.lat, d.lng], d.naam);
}

function buildRoute(from, to, naam) {
  // Verwijder bestaande route
  if (routeControl) { map.removeControl(routeControl); routeControl = null; }
  routeLines.forEach(function(p){ map.removeLayer(p); });
  routeLines = [];
  allRoutes  = [];
  document.getElementById('route-tabs').innerHTML = '';
  document.getElementById('instr-list').innerHTML = '<div style="color:var(--muted);font-size:12px;padding:4px 0;">Berekenen...</div>';
  hint('🔄 Routes berekenen naar ' + naam + '...', 0);

  routeControl = L.Routing.control({
    waypoints: [ L.latLng(from[0], from[1]), L.latLng(to[0], to[1]) ],
    router: L.Routing.osrmv1({
      serviceUrl: 'https://router.project-osrm.org/route/v1',
      profile: 'driving'
    }),
    routeWhileDragging: false,
    showAlternatives: true,      // ← vraag meerdere routes op
    alternatives: true,
    lineOptions: { styles:[] },  // wij tekenen zelf de lijnen
    createMarker: function(i, wp) {
      return L.marker(wp.latLng, {
        icon: L.divIcon({
          html: '<div style="width:16px;height:16px;background:' + (i===0?'#00d4ff':'#ff4444') + ';border-radius:50%;border:2px solid white;box-shadow:0 0 10px ' + (i===0?'#00d4ff':'#ff4444') + ';display:flex;align-items:center;justify-content:center;font-size:9px;">' + (i===0?'🏠':'🚛') + '</div>',
          iconSize:[16,16], iconAnchor:[8,8], className:''
        })
      });
    }
  }).addTo(map);

  routeControl.on('routesfound', function(ev) {
    var routes = ev.routes;
    allRoutes  = routes;

    // Teken alle routes op kaart als polylines
    // Sorteer op tijd zodat snelste = index 0
    routes.sort(function(a,b){ return a.summary.totalTime - b.summary.totalTime; });

    routes.forEach(function(route, i) {
      var coords = route.coordinates;
      var poly = L.polyline(coords, {
        color:   i === 0 ? ROUTE_COLORS[0] : (ROUTE_COLORS[i+1] || '#888'),
        weight:  i === 0 ? 6 : 3,
        opacity: i === 0 ? 0.95 : 0.4
      }).addTo(map);
      // Klik op alternatieve lijn = activeer die route
      poly.on('click', (function(idx){ return function(){ activateRoute(idx); }; })(i));
      routeLines.push(poly);
    });

    // Render tabs en activeer snelste
    renderRouteTabs(routes);
    activateRoute(0);
    document.getElementById('route-panel').classList.add('open');

    // Zoom op alle routes samen
    if (routeLines.length > 0) {
      var group = L.featureGroup(routeLines);
      map.fitBounds(group.getBounds().pad(0.15));
    }

    hint('✅ ' + routes.length + ' route' + (routes.length>1?'s':'') + ' gevonden — kies de beste', 6000);
  });

  routeControl.on('routingerror', function() {
    hint('⚠️ Route mislukt — controleer internetverbinding', 6000);
    document.getElementById('instr-list').innerHTML = '<div style="color:var(--red);font-size:12px;">Route berekening mislukt.</div>';
  });
}

function clearRoute() {
  if (routeControl) { map.removeControl(routeControl); routeControl = null; }
  routeLines.forEach(function(p){ map.removeLayer(p); });
  routeLines = []; allRoutes = [];
  document.getElementById('route-panel').classList.remove('open');
  document.getElementById('route-tabs').innerHTML = '';
  document.getElementById('instr-list').innerHTML = '';
  hint('Route gewist', 3000);
}

function focusDriver() {
  if (!selectedId || !driverData[selectedId]) return;
  map.flyTo([driverData[selectedId].lat, driverData[selectedId].lng], 15, { duration:1.2 });
}

// ── FIREBASE ──────────────────────────────────────────
db.ref('/').on('value', function(snap) {
  var root      = snap.val() || {};
  var tracking  = root.tracking  || {};
  var meldingen = root.meldingen || {};
  var list      = document.getElementById('driver-list');
  var filter    = document.getElementById('search-input').value.toLowerCase();

  list.innerHTML = '';
  var totaal = 0, rijdend = 0, sos = 0;

  for (var id in tracking) {
    if (id === '1' || id === 'Gast_User') continue;
    var pos  = tracking[id];
    var meta = meldingen[id] || { naam:'Chauffeur', status:'STANDBY' };

    driverData[id] = { lat:pos.latitude, lng:pos.longitude, naam:meta.naam, status:meta.status };
    totaal++;
    if (meta.status === 'START_RIT' || meta.status === 'rijden') rijdend++;
    if (meta.status === 'SOS') sos++;

    if (markers[id]) {
      markers[id].setLatLng([pos.latitude, pos.longitude]);
      markers[id].setIcon(truckIcon(meta.status, id === selectedId));
    } else {
      markers[id] = L.marker([pos.latitude, pos.longitude], { icon:truckIcon(meta.status, false) })
        .addTo(map)
        .bindPopup('<b>' + meta.naam + '</b><br><small>' + meta.status + '</small>');
      markers[id].on('click', (function(i){ return function(){ selectDriver(i); }; })(id));
    }

    if (filter && meta.naam.toLowerCase().indexOf(filter) === -1) continue;

    var statusClass = 's-' + meta.status.toLowerCase().replace(/\s+/g,'_');
    var card = document.createElement('div');
    card.className = 'driver-card ' + statusClass + (selectedId === id ? ' active' : '');
    card.id = 'card-' + id;
    card.innerHTML =
      '<div class="d-avatar">' + meta.naam.substring(0,2).toUpperCase() + '</div>' +
      '<div class="d-info">' +
        '<div class="d-name">' + meta.naam + '</div>' +
        '<div class="d-meta">' + badge(meta.status) + '</div>' +
      '</div>' +
      '<button class="route-btn" onclick="event.stopPropagation();routeToDriver(\'' + id + '\')">🏠 Route</button>';
    card.onclick = (function(i){ return function(){ selectDriver(i); }; })(id);
    list.appendChild(card);
  }

  document.getElementById('s-total').textContent = totaal;
  document.getElementById('s-rij').textContent   = rijdend;
  document.getElementById('s-sos').textContent   = sos;

  var loader = document.getElementById('loading');
  if (loader) { loader.style.opacity = '0'; setTimeout(function(){ loader.remove(); }, 600); }

  if (totaal === 0) {
    list.innerHTML = '<div style="padding:24px 16px;text-align:center;color:var(--muted);font-size:13px;line-height:1.8;">Geen chauffeurs gevonden.<br><small>Controleer Firebase apiKey.</small></div>';
    hint('⚠️ Geen data — controleer apiKey', 0);
  } else {
    hint('✅ ' + totaal + ' voertuig' + (totaal>1?'en':'') + ' live — klik 🏠 Route', 7000);
  }
});

// ── ZOEKEN ────────────────────────────────────────────
document.getElementById('search-input').addEventListener('input', function() {
  var filter = this.value.toLowerCase();
  document.querySelectorAll('.driver-card').forEach(function(c) {
    var name = c.querySelector('.d-name') ? c.querySelector('.d-name').textContent.toLowerCase() : '';
    c.style.display = name.indexOf(filter) !== -1 ? '' : 'none';
  });
});

// ── START ─────────────────────────────────────────────
startGeolocation();
hint('🔄 Verbinden met Firebase...', 0);
</script>
