<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cakir Logistics | Intelligent Routing</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #002d5b; --accent: #007bff; --success: #28a745; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: #f8f9fa; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        
        .sidebar {
            position: absolute; top: 0; left: 0; z-index: 1000;
            width: 380px; height: 100vh; background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1); display: flex; flex-direction: column;
        }

        .header { padding: 20px; background: var(--primary); color: white; }
        .planner-box { padding: 15px; background: #f1f3f5; border-bottom: 1px solid #ddd; }
        
        .driver-card {
            padding: 15px; border-bottom: 1px solid #eee; cursor: pointer;
            transition: 0.2s;
        }
        .driver-card:hover { background: #f0f7ff; }
        .driver-card.selected { border-left: 5px solid var(--accent); background: #e7f1ff; }

        .eta-box { 
            margin-top: 8px; padding: 8px; background: #fff; 
            border-radius: 6px; border: 1px dashed var(--success);
            font-size: 13px; color: var(--success); font-weight: bold;
        }

        input, button { 
            width: 100%; padding: 10px; margin-top: 5px; 
            border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box;
        }
        button { background: var(--accent); color: white; font-weight: bold; cursor: pointer; border: none; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="header">
            <h2 style="margin:0;">Route Planner</h2>
            <div style="font-size: 11px; opacity: 0.8;">Week 7: OSRM Routing Engine</div>
        </div>

        <div class="planner-box">
            <label style="font-size: 12px; font-weight: bold;">Bestemming (Lat, Lon):</label>
            <input type="text" id="dest-input" placeholder="Bijv: 51.065, 4.028">
            <button onclick="window.planRoute()">Bereken Snelste Route</button>
        </div>

        <div id="driver-list" style="flex:1; overflow-y:auto;">
            </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "JOUW_KEY",
            databaseURL: "https://cakir-logistics-tracker-c4b6b-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "cakir-logistics-tracker"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const map = L.map('map', { zoomControl: false }).setView([51.0654, 4.0289], 11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        const markers = {};
        let routeLayer = null;
        let selectedDriverId = null;
        let driverCoords = {};

        // SELECTEER CHAUFFEUR
        window.selectDriver = (id, lat, lon) => {
            selectedDriverId = id;
            map.flyTo([lat, lon], 14);
            document.querySelectorAll('.driver-card').forEach(el => el.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
        };

        // BEREKEN ROUTE VIA OSRM API
        window.planRoute = async () => {
            if (!selectedDriverId) return alert("Selecteer eerst een chauffeur!");
            const destStr = document.getElementById('dest-input').value;
            if (!destStr.includes(',')) return alert("Voer een geldige bestemming in (lat, lon)");

            const [dLat, dLon] = destStr.split(',').map(s => s.trim());
            const sLat = driverCoords[selectedDriverId].lat;
            const sLon = driverCoords[selectedDriverId].lon;

            const url = `https://router.project-osrm.org/route/v1/driving/${sLon},${sLat};${dLon},${dLat}?overview=full&geometries=geojson`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                const route = data.routes[0];

                // Verwijder oude route
                if (routeLayer) map.removeLayer(routeLayer);

                // Teken de nieuwe route op de kaart
                routeLayer = L.geoJSON(route.geometry, {
                    style: { color: '#007bff', weight: 6, opacity: 0.7 }
                }).addTo(map);

                // Update ETA in de UI
                const duration = Math.round(route.duration / 60);
                const distance = (route.distance / 1000).toFixed(1);
                document.getElementById(`eta-${selectedDriverId}`).innerText = 
                    `⏱️ ETA: ${duration} min (${distance} km)`;

                map.fitBounds(routeLayer.getBounds(), { padding: [50, 50] });

            } catch (e) {
                alert("Fout bij routeberekening: " + e.message);
            }
        };

        onValue(ref(db, 'tracking'), (snapshot) => {
            const tracking = snapshot.val() || {};
            const list = document.getElementById('driver-list');
            list.innerHTML = "";

            for (let id in tracking) {
                if (id === "1" || id === "Gast_User") continue;
                const loc = tracking[id];
                driverCoords[id] = { lat: loc.latitude, lon: loc.longitude };

                if (markers[id]) {
                    markers[id].setLatLng([loc.latitude, loc.longitude]);
                } else {
                    markers[id] = L.marker([loc.latitude, loc.longitude]).addTo(map).bindPopup(id);
                }

                list.innerHTML += `
                    <div class="driver-card" onclick="selectDriver('${id}', ${loc.latitude}, ${loc.longitude})">
                        <strong>ID: ${id.substring(0, 8)}</strong>
                        <div style="font-size: 12px; color: #666;">Locatie: ${loc.latitude.toFixed(4)}, ${loc.longitude.toFixed(4)}</div>
                        <div class="eta-box" id="eta-${id}">Klik 'Bereken Route' voor ETA</div>
                    </div>`;
            }
        });
    </script>
</body>
</html>
