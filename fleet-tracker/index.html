<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cakir Logistics | Live Monitoring</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; }
        #map { height: 100vh; width: 100%; }
        
        .overlay-panel {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(255, 255, 255, 0.95); padding: 20px;
            border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 320px; border-left: 6px solid #0056b3;
            max-height: 80vh; overflow-y: auto;
        }

        .driver-item {
            background: #fff; padding: 15px; border-radius: 8px;
            margin-bottom: 12px; border: 1px solid #ddd; cursor: pointer;
            transition: all 0.2s ease;
        }
        .driver-item:hover { border-color: #0056b3; background: #f0f7ff; }
        
        .name { font-weight: bold; font-size: 16px; color: #333; }
        .info-row { font-size: 13px; color: #666; margin-top: 5px; }
        .timer-val { color: #0056b3; font-weight: bold; }
        
        .status-tag { 
            font-size: 10px; padding: 2px 6px; border-radius: 4px; 
            font-weight: bold; margin-left: 5px;
        }
        .status-start_rit { background: #d4edda; color: #155724; }
        .status-pauze { background: #fff3cd; color: #856404; }
        .status-sos { background: #f8d7da; color: #721c24; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="overlay-panel">
        <h2 style="margin:0 0 15px 0;">Vloot Overzicht</h2>
        <div id="driver-list">Live data laden...</div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "JOUW_KEY",
            authDomain: "cakir-logistics-tracker.firebaseapp.com",
            databaseURL: "https://cakir-logistics-tracker-c4b6b-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "cakir-logistics-tracker"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const map = L.map('map').setView([51.0654, 4.0289], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        const markers = {};

        // Functie om de verstreken tijd te berekenen
        function getDuration(startTime) {
            if (!startTime) return "N.v.t.";
            const diff = Date.now() - startTime;
            const hours = Math.floor(diff / 3600000);
            const minutes = Math.floor((diff % 3600000) / 60000);
            const seconds = Math.floor((diff % 60000) / 1000);
            return `${hours}u ${minutes}m ${seconds}s`;
        }

        onValue(ref(db, '/'), (snapshot) => {
            const allData = snapshot.val();
            const tracking = allData.tracking;
            const meldingen = allData.meldingen;
            const list = document.getElementById('driver-list');
            list.innerHTML = "";

            for (let id in tracking) {
                if (id === "1" || id === "Gast_User") continue;

                const loc = tracking[id];
                const info = meldingen[id] || { naam: "Onbekend", status: "GEEN_DATA", timestamp: 0 };
                
                // Marker Logica
                const popupText = `<b>${info.naam}</b><br>Bezig: ${getDuration(info.timestamp)}`;
                if (markers[id]) {
                    markers[id].setLatLng([loc.latitude, loc.longitude]).setPopupContent(popupText);
                } else {
                    markers[id] = L.marker([loc.latitude, loc.longitude]).addTo(map).bindPopup(popupText);
                }

                // UI kaartje maken
                const startTimeStr = info.timestamp ? new Date(info.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "--:--";
                const statusClass = "status-" + info.status.toLowerCase();

                list.innerHTML += `
                    <div class="driver-item" onclick="map.flyTo([${loc.latitude}, ${loc.longitude}], 15)">
                        <div class="name">${info.naam} <span class="status-tag ${statusClass}">${info.status}</span></div>
                        <div class="info-row">Gestart om: <b>${startTimeStr}</b></div>
                        <div class="info-row">Duur status: <span class="timer-val" data-time="${info.timestamp}">${getDuration(info.timestamp)}</span></div>
                    </div>`;
            }
        });

        // Update de timers elke seconde zonder de hele lijst te herladen
        setInterval(() => {
            document.querySelectorAll('.timer-val').forEach(el => {
                const time = parseInt(el.getAttribute('data-time'));
                if (time) el.innerText = getDuration(time);
            });
        }, 1000);
    </script>
</body>
</html>
