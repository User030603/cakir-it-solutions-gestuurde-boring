<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cakir Logistics | Pro Route Planner</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    
    <style>
        :root { --primary: #002d5b; --accent: #007bff; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: #f8f9fa; overflow: hidden; }
        #map { height: 100vh; width: 100%; }
        
        .sidebar {
            position: absolute; top: 0; left: 0; z-index: 1000;
            width: 380px; height: 100vh; background: white;
            box-shadow: 2px 0 15px rgba(0,0,0,0.2); display: flex; flex-direction: column;
        }

        .header { padding: 20px; background: var(--primary); color: white; }
        
        /* De Zoekbox Stijl */
        .search-container { padding: 20px; background: #fff; border-bottom: 2px solid #eee; }
        .search-box { 
            width: 100%; padding: 12px; border: 2px solid var(--accent); 
            border-radius: 8px; font-size: 14px; outline: none;
        }

        .driver-list { flex: 1; overflow-y: auto; padding: 10px; }
        .driver-card {
            background: white; padding: 15px; border-radius: 10px;
            margin-bottom: 10px; border: 1px solid #eee; cursor: pointer; transition: 0.3s;
        }
        .driver-card.selected { border-left: 6px solid var(--accent); background: #e7f1ff; }

        .eta-badge { 
            margin-top: 10px; padding: 8px; background: #28a745; color: white; 
            border-radius: 5px; font-weight: bold; font-size: 12px; display: none;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="header">
            <h2 style="margin:0;">Fleet Dispatcher</h2>
            <div style="font-size: 12px; opacity: 0.8;">Cakir Logistics - Week 7 Pro</div>
        </div>

        <div class="search-container">
            <label style="font-weight: bold; font-size: 12px; color: #666;">BESTEMMING INVOEREN (Maps-stijl):</label>
            <input type="text" id="address-input" class="search-box" placeholder="Typ een adres of stad...">
            <p style="font-size: 11px; color: #888; margin-top: 5px;">Klik op een chauffeur en typ daarna het adres.</p>
        </div>

        <div id="driver-list" class="driver-list"></div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "JOUW_KEY",
            databaseURL: "https://cakir-logistics-tracker-c4b6b-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "cakir-logistics-tracker"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const map = L.map('map', { zoomControl: false }).setView([51.0654, 4.0289], 11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        const geocoder = L.Control.Geocoder.nominatim();
        const markers = {};
        let routeLayer = null;
        let selectedDriverId = null;
        let driverCoords = {};

        // CHAUFFEUR SELECTEREN
        window.selectDriver = (id, lat, lon) => {
            selectedDriverId = id;
            map.flyTo([lat, lon], 14);
            document.querySelectorAll('.driver-card').forEach(el => el.classList.remove('selected'));
            document.getElementById(`card-${id}`).classList.add('selected');
        };

        // ADRES ZOEKEN & ROUTE MAKEN
        const input = document.getElementById('address-input');
        input.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                if (!selectedDriverId) return alert("Selecteer eerst een chauffeur!");
                
                const address = input.value;
                geocoder.geocode(address, (results) => {
                    if (results.length > 0) {
                        const dest = results[0].center;
                        calculateRoute(dest.lat, dest.lng);
                    } else {
                        alert("Adres niet gevonden!");
                    }
                });
            }
        });

        async function calculateRoute(dLat, dLon) {
            const { lat: sLat, lon: sLon } = driverCoords[selectedDriverId];
            const url = `https://router.project-osrm.org/route/v1/driving/${sLon},${sLat};${dLon},${dLat}?overview=full&geometries=geojson`;

            const response = await fetch(url);
            const data = await response.json();
            const route = data.routes[0];

            if (routeLayer) map.removeLayer(routeLayer);
            routeLayer = L.geoJSON(route.geometry, { style: { color: '#007bff', weight: 6 } }).addTo(map);

            const duration = Math.round(route.duration / 60);
            const distance = (route.distance / 1000).toFixed(1);
            
            const etaBadge = document.getElementById(`eta-${selectedDriverId}`);
            etaBadge.style.display = "block";
            etaBadge.innerHTML = `⏱️ ${duration} min (${distance} km)`;

            map.fitBounds(routeLayer.getBounds(), { padding: [50, 50] });
        }

        // FIREBASE DATA (Namen & Locaties)
        onValue(ref(db, '/'), (snapshot) => {
            const data = snapshot.val() || {};
            const tracking = data.tracking || {};
            const meldingen = data.meldingen || {};
            const list = document.getElementById('driver-list');
            list.innerHTML = "";

            for (let id in tracking) {
                if (id === "1" || id === "Gast_User") continue;
                const loc = tracking[id];
                const info = meldingen[id] || { naam: "Laden...", status: "Actief" };
                driverCoords[id] = { lat: loc.latitude, lon: loc.longitude };

                if (!markers[id]) markers[id] = L.marker([loc.latitude, loc.longitude]).addTo(map);
                markers[id].setLatLng([loc.latitude, loc.longitude]).bindPopup(info.naam);

                list.innerHTML += `
                    <div class="driver-card" id="card-${id}" onclick="selectDriver('${id}', ${loc.latitude}, ${loc.longitude})">
                        <strong style="font-size:16px;">${info.naam}</strong>
                        <div style="font-size:12px; color:#777;">Status: ${info.status}</div>
                        <div class="eta-badge" id="eta-${id}"></div>
                    </div>`;
            }
        });
    </script>
</body>
</html>
