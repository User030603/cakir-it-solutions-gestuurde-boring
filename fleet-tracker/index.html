<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cakir Logistics | Smart Route Planner</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #002d5b; --accent: #007bff; --success: #28a745; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: #f8f9fa; overflow: hidden; }
        #map { height: 100vh; width: 100%; cursor: crosshair; }
        
        .sidebar {
            position: absolute; top: 0; left: 0; z-index: 1000;
            width: 360px; height: 100vh; background: white;
            box-shadow: 2px 0 15px rgba(0,0,0,0.2); display: flex; flex-direction: column;
        }

        .header { padding: 20px; background: var(--primary); color: white; }
        .instruction-box { padding: 15px; background: #fff3cd; border-bottom: 1px solid #ffeeba; font-size: 13px; color: #856404; }
        
        .driver-list { flex: 1; overflow-y: auto; padding: 10px; }
        .driver-card {
            background: white; padding: 15px; border-radius: 10px;
            margin-bottom: 10px; border: 1px solid #eee; cursor: pointer;
            transition: 0.3s;
        }
        .driver-card:hover { border-color: var(--accent); background: #f0f7ff; }
        .driver-card.selected { border-left: 6px solid var(--accent); background: #e7f1ff; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }

        .name-header { font-weight: bold; font-size: 16px; color: var(--primary); display: block; }
        .eta-result { 
            margin-top: 10px; padding: 10px; background: #d4edda; 
            border-radius: 8px; color: #155724; font-size: 13px; 
            font-weight: bold; border: 1px solid #c3e6cb; display: none;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="header">
            <h2 style="margin:0;">Smart Planner</h2>
            <div style="font-size: 12px; opacity: 0.8;">Cakir IT Solutions - Fleet Control</div>
        </div>

        <div class="instruction-box" id="guide">
            <b>Stap 1:</b> Klik op een chauffeur in de lijst.<br>
            <b>Stap 2:</b> Klik ergens op de kaart (bestemming).
        </div>

        <div id="driver-list" class="driver-list">
            </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "JOUW_KEY",
            databaseURL: "https://cakir-logistics-tracker-c4b6b-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "cakir-logistics-tracker"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const map = L.map('map', { zoomControl: false }).setView([51.0654, 4.0289], 11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        const markers = {};
        let routeLayer = null;
        let destMarker = null;
        let selectedDriverId = null;
        let driverCoords = {};

        // 1. SELECTEER CHAUFFEUR
        window.selectDriver = (id, lat, lon) => {
            selectedDriverId = id;
            map.flyTo([lat, lon], 14);
            document.querySelectorAll('.driver-card').forEach(el => el.classList.remove('selected'));
            document.getElementById(`card-${id}`).classList.add('selected');
            document.getElementById('guide').innerHTML = "<b>Stap 2:</b> Klik nu op de kaart om de route te berekenen.";
        };

        // 2. KLIK OP KAART = ROUTE BEREKENEN
        map.on('click', async (e) => {
            if (!selectedDriverId) return alert("Selecteer eerst een chauffeur uit de lijst!");

            const { lat: dLat, lng: dLon } = e.latlng;
            const { lat: sLat, lon: sLon } = driverCoords[selectedDriverId];

            // Plaats of verplaats bestemmingsmarker
            if (destMarker) map.removeLayer(destMarker);
            destMarker = L.marker([dLat, dLon], { icon: L.divIcon({className: 'dest-icon', html: '📍', iconSize: [30, 30]}) }).addTo(map);

            const url = `https://router.project-osrm.org/route/v1/driving/${sLon},${sLat};${dLon},${dLat}?overview=full&geometries=geojson`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                const route = data.routes[0];

                if (routeLayer) map.removeLayer(routeLayer);
                routeLayer = L.geoJSON(route.geometry, { style: { color: '#007bff', weight: 6, opacity: 0.8 } }).addTo(map);

                const duration = Math.round(route.duration / 60);
                const distance = (route.distance / 1000).toFixed(1);
                
                const etaBox = document.getElementById(`eta-${selectedDriverId}`);
                etaBox.style.display = "block";
                etaBox.innerText = `🚚 Bestemming bereikt in: ${duration} min (${distance} km)`;

                map.fitBounds(routeLayer.getBounds(), { padding: [100, 100] });
            } catch (err) { alert("Route niet gevonden."); }
        });

        onValue(ref(db, '/'), (snapshot) => {
            const data = snapshot.val() || {};
            const tracking = data.tracking || {};
            const meldingen = data.meldingen || {};
            const list = document.getElementById('driver-list');
            list.innerHTML = "";

            for (let id in tracking) {
                if (id === "1" || id === "Gast_User") continue;
                const loc = tracking[id];
                const info = meldingen[id] || { naam: "Chauffeur", status: "Actief" };
                driverCoords[id] = { lat: loc.latitude, lon: loc.longitude };

                if (markers[id]) {
                    markers[id].setLatLng([loc.latitude, loc.longitude]);
                } else {
                    markers[id] = L.marker([loc.latitude, loc.longitude]).addTo(map).bindPopup(`<b>${info.naam}</b>`);
                }

                list.innerHTML += `
                    <div class="driver-card" id="card-${id}" onclick="selectDriver('${id}', ${loc.latitude}, ${loc.longitude})">
                        <span class="name-header">${info.naam}</span>
                        <div style="font-size: 12px; color: #666;">Status: ${info.status}</div>
                        <div class="eta-result" id="eta-${id}"></div>
                    </div>`;
            }
        });
    </script>
</body>
</html>
