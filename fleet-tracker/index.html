<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cakir Logistics | Ultimate Control Center</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --google-blue: #1a73e8;
            --google-red: #d93025;
            --google-green: #188038;
            --bg-light: #f8f9fa;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Roboto', sans-serif; overflow: hidden; background: #e5e3df; }
        #map { height: 100vh; width: 100%; z-index: 1; cursor: crosshair; }

        /* --- FLOATING UI (Google-stijl) --- */
        #maps-ui-layer {
            position: absolute; top: 12px; left: 12px; z-index: 1000;
            width: 390px; max-height: 95vh; display: flex; flex-direction: column;
            pointer-events: none; /* Klikken gaat door lege ruimtes heen */
        }

        .google-panel {
            pointer-events: auto; /* Klikken werkt op panels */
            background: white; border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.3); margin-bottom: 12px;
            overflow: hidden;
        }

        /* Zoekbalk */
        .search-box-wrapper { display: flex; align-items: center; padding: 0 16px; min-height: 48px; border-bottom: 1px solid #eee; }
        .search-box-wrapper input {
            border: none; outline: none; flex: 1; font-size: 16px; color: #202124; padding: 12px 0;
        }
        .search-icon { color: #70757a; margin-right: 15px; font-size: 18px; }

        /* Chauffeur Lijst */
        .fleet-tray { flex: 1; display: flex; flex-direction: column; min-height: 0; }
        .list-header { padding: 16px; border-bottom: 1px solid #eee; font-weight: 500; color: var(--google-blue); font-size: 14px; }
        
        .driver-list { overflow-y: auto; max-height: 400px; }
        .driver-item {
            display: flex; padding: 16px; border-bottom: 1px solid #f1f3f4;
            cursor: pointer; transition: background 0.2s; align-items: center;
        }
        .driver-item:hover { background: #f1f3f4; }
        .driver-item.selected { background: #e8f0fe; border-left: 4px solid var(--google-blue); }

        .driver-icon {
            width: 40px; height: 40px; border-radius: 50%; background: #e8eaed;
            display: flex; align-items: center; justify-content: center;
            margin-right: 15px; font-weight: bold; color: #5f6368; font-size: 16px;
        }
        .driver-details { flex: 1; }
        .driver-name { font-size: 15px; font-weight: 500; color: #3c4043; }
        .driver-meta { font-size: 12px; color: #70757a; margin-top: 2px; }

        /* Route Informatie */
        .eta-panel {
            padding: 16px; background: var(--google-blue); color: white;
            display: none; border-top: 1px solid rgba(255,255,255,0.2);
        }
        .eta-time { font-size: 24px; font-weight: bold; }
        .eta-details { font-size: 14px; opacity: 0.9; }

        /* --- FLOATING BUTTONS (Rechtsonder) --- */
        .map-fab-container { position: absolute; bottom: 30px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
        .fab {
            width: 40px; height: 40px; background: white; border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.3); border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 20px; color: #5f6368;
        }
        .fab:hover { background: #f8f9fa; }
        .fab.active { color: var(--google-blue); }

    </style>
</head>
<body>

    <div id="maps-ui-layer">
        <div class="google-panel search-box-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" id="map-search" placeholder="Zoek een boorlocatie of adres..." autocomplete="off">
        </div>

        <div class="google-panel fleet-tray">
            <div class="list-header">Cakir IT Solutions - Fleet Dispatching</div>
            <div class="driver-list" id="driver-list">
                </div>
            
            <div id="eta-container" class="eta-panel">
                <div class="eta-time" id="eta-time">-- min</div>
                <div class="eta-details" id="eta-dist">Route berekenen...</div>
            </div>
        </div>
    </div>

    <div class="map-fab-container">
        <button class="fab" onclick="window.findMyLocation()" title="Mijn Locatie">🎯</button>
        <button class="fab" onclick="window.toggleTraffic()" id="traffic-btn" title="Live Verkeer">🚦</button>
        <button class="fab" onclick="map.setZoom(map.getZoom() + 1)">+</button>
        <button class="fab" onclick="map.setZoom(map.getZoom() - 1)">-</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // FIREBASE SETUP
        const firebaseConfig = {
            apiKey: "JOUW_KEY",
            databaseURL: "https://cakir-logistics-tracker-c4b6b-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "cakir-logistics-tracker"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // KAART INITIALISATIE
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([51.0654, 4.0289], 10);
        
        // Google-stijl open source kaartlaag (HOT)
        const baseLayer = L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png').addTo(map);
        
        // Live Verkeer Laag (via Proxy, gratis versie)
        const trafficLayer = L.tileLayer('https://{s}.google.com/vt/lyrs=m,traffic&x={x}&y={y}&z={z}', {
            maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'], opacity: 0
        }).addTo(map);

        // Verkeer Knop Logica
        let trafficVisible = false;
        window.toggleTraffic = () => {
            trafficVisible = !trafficVisible;
            trafficLayer.setOpacity(trafficVisible ? 0.7 : 0);
            const btn = document.getElementById('traffic-btn');
            trafficVisible ? btn.classList.add('active') : btn.classList.remove('active');
        };

        // Mijn Locatie Logica
        window.findMyLocation = () => {
            map.locate({setView: true, maxZoom: 15});
        };
        map.on('locationfound', (e) => {
            L.circle(e.latlng, e.accuracy, {color: '#1a73e8', fillColor: '#1a73e8', fillOpacity: 0.15}).addTo(map);
            L.marker(e.latlng, {icon: L.divIcon({className: 'my-loc', html: '🔵', iconSize: [12, 12]})}).addTo(map);
        });

        const geocoder = L.Control.Geocoder.nominatim();
        const markers = {};
        const driverLocations = {};
        let selectedDriverId = null;
        let routePolyline = null;
        let destMarker = null;

        // CHAUFFEUR SELECTEREN
        window.selectDriver = (id, lat, lon) => {
            selectedDriverId = id;
            map.flyTo([lat, lon], 15);
            // UI Update
            document.querySelectorAll('.driver-item').forEach(el => el.classList.remove('selected'));
            document.getElementById(`item-${id}`).classList.add('selected');
        };

        // ROUTE PLANNING OP KAART KLIK
        map.on('click', async (e) => {
            if (!selectedDriverId) return alert("Selecteer eerst een chauffeur in de lijst!");

            const { lat: dLat, lng: dLon } = e.latlng;
            const start = driverLocations[selectedDriverId];

            // Bestemmingspeld plaatsen
            if (destMarker) map.removeLayer(destMarker);
            destMarker = L.marker([dLat, dLon]).addTo(map).bindPopup("Geselecteerde Bestemming").openPopup();

            // OSRM Route Berekening (Open Source)
            const url = `https://router.project-osrm.org/route/v1/driving/${start.lon},${start.lat};${dLon},${dLat}?overview=full&geometries=geojson`;

            const res = await fetch(url);
            const data = await res.json();
            const route = data.routes[0];

            if (routePolyline) map.removeLayer(routePolyline);
            routePolyline = L.geoJSON(route.geometry, { style: { color: '#1a73e8', weight: 6, opacity: 0.8 } }).addTo(map);

            // Update de Blauwe ETA balk
            const container = document.getElementById('eta-container');
            container.style.display = "block";
            document.getElementById('eta-time').innerText = Math.round(route.duration / 60) + " min";
            document.getElementById('eta-dist').innerText = `Snelste route: ${(route.distance / 1000).toFixed(1)} km`;

            map.fitBounds(routePolyline.getBounds(), { padding: [100, 100] });
        });

        // ADRES ZOEKEN (ENTER)
        const searchInput = document.getElementById('map-search');
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (!selectedDriverId) return alert("Selecteer eerst een chauffeur!");
                geocoder.geocode(searchInput.value, (results) => {
                    if (results.length > 0) {
                        const target = results[0].center;
                        // Trigger routeberekening alsof er op de kaart is geklikt
                        map.fireEvent('click', {latlng: target, layerPoint: map.latLngToLayerPoint(target), containerPoint: map.latLngToContainerPoint(target)});
                    }
                });
            }
        });

        // FIREBASE LIVE UPDATES
        onValue(ref(db, '/'), (snapshot) => {
            const data = snapshot.val() || {};
            const tracking = data.tracking || {};
            const meldingen = data.meldingen || {};
            const list = document.getElementById('driver-list');
            list.innerHTML = "";

            for (let id in tracking) {
                if (id === "1" || id === "Gast_User") continue;
                const loc = tracking[id];
                const info = meldingen[id] || { naam: "Chauffeur", status: "Actief", timestamp: Date.now() };
                driverLocations[id] = { lat: loc.latitude, lon: loc.longitude };

                // Update Marker op kaart
                if (!markers[id]) markers[id] = L.marker([loc.latitude, loc.longitude]).addTo(map);
                markers[id].setLatLng([loc.latitude, loc.longitude]).bindPopup(`<b>${info.naam}</b><br>Status: ${info.status}`);

                // Update Lijst item
                const verstreken = Math.round((Date.now() - info.timestamp) / 60000);
                list.innerHTML += `
                    <div class="driver-item" id="item-${id}" onclick="selectDriver('${id}', ${loc.latitude}, ${loc.longitude})">
                        <div class="driver-icon">${info.naam.substring(0, 1)}</div>
                        <div class="driver-details">
                            <div class="driver-name">${info.naam}</div>
                            <div class="driver-meta">Status: ${info.status} (Update: ${verstreken} min geleden)</div>
                        </div>
                    </div>`;
            }
        });

    </script>
</body>
</html>
