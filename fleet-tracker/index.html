<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cakir Logistics | Fleet Control</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; }
        #map { height: 100vh; width: 100%; }
        
        .overlay-panel {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(255, 255, 255, 0.95); padding: 20px;
            border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 300px; border-left: 6px solid #0056b3;
        }

        .driver-item {
            background: #fff; padding: 12px; border-radius: 8px;
            margin-bottom: 10px; border: 1px solid #ddd; cursor: pointer;
            transition: all 0.2s ease;
        }
        .driver-item:hover { border-color: #0056b3; background: #f0f7ff; transform: translateX(5px); }
        .name { font-weight: bold; display: block; color: #333; }
        .status-tag { 
            font-size: 11px; padding: 3px 8px; border-radius: 4px; 
            font-weight: bold; text-transform: uppercase;
        }
        /* Kleuren voor statussen uit Firebase */
        .status-start { background: #d4edda; color: #155724; }
        .status-pauze { background: #fff3cd; color: #856404; }
        .status-aangekomen { background: #d1ecf1; color: #0c5460; }
        .status-sos { background: #f8d7da; color: #721c24; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="overlay-panel">
        <h2 style="margin-top:0;">Fleet Overview</h2>
        <div id="driver-list">Zoeken naar actieve ritten...</div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase Config (Gebruik je eigen keys)
        const firebaseConfig = {
            apiKey: "JOUW_KEY",
            authDomain: "cakir-logistics-tracker.firebaseapp.com",
            databaseURL: "https://cakir-logistics-tracker-c4b6b-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "cakir-logistics-tracker"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const map = L.map('map').setView([51.0654, 4.0289], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        const markers = {};

        // Functie om naar een chauffeur te springen
        window.focusDriver = (lat, lon, id) => {
            map.flyTo([lat, lon], 15);
            markers[id].openPopup();
        };

        // Luister naar de 'meldingen' node voor status en de 'tracking' node voor locatie
        onValue(ref(db, '/'), (snapshot) => {
            const allData = snapshot.val();
            const tracking = allData.tracking;
            const meldingen = allData.meldingen;
            const list = document.getElementById('driver-list');
            list.innerHTML = "";

            for (let id in tracking) {
                if (id === "1" || id === "Gast_User") continue;

                const loc = tracking[id];
                const info = meldingen[id] || { naam: "Onbekend", status: "GEEN_DATA" };
                
                // Marker updaten of maken
                const popupContent = `<b>${info.naam}</b><br>Status: ${info.status}`;
                if (markers[id]) {
                    markers[id].setLatLng([loc.latitude, loc.longitude]).setPopupContent(popupContent);
                } else {
                    markers[id] = L.marker([loc.latitude, loc.longitude]).addTo(map).bindPopup(popupContent);
                }

                // Status class bepalen voor de UI
                const statusClass = "status-" + info.status.toLowerCase().replace("_", "-");

                // Lijst-item toevoegen met onclick event
                list.innerHTML += `
                    <div class="driver-item" onclick="focusDriver(${loc.latitude}, ${loc.longitude}, '${id}')">
                        <span class="name">${info.naam}</span>
                        <span class="status-tag ${statusClass}">${info.status}</span>
                        <div style="font-size: 10px; color: #999; margin-top: 5px;">Klik om te volgen</div>
                    </div>`;
            }
        });
    </script>
</body>
</html>
